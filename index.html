<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conveyor Sum</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Smokey Liquid Glass Design System */
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

        :root {
            --glass-bg: rgba(20, 25, 35, 0.65); /* Smokey, dark base */
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 16px 40px 0 rgba(0, 0, 0, 0.5);
            --glass-inner-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #4E65FF, #92EFFD, #FF6B6B, #FF8E53);
            color: white;
            user-select: none;
        }

        .liquid-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow), var(--glass-inner-shadow);
            border-radius: 28px;
            position: relative;
            /* Removed overflow: hidden to allow exploding particles to fly out of the pane */
        }

        .liquid-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 100%);
            border-radius: inherit;
            pointer-events: none;
            z-index: 0;
        }

        /* Elements inside panel need to be relatively positioned to sit above the before-gradient */
        .liquid-panel > * {
            position: relative;
            z-index: 1;
        }

        .liquid-tile {
            background: rgba(15, 20, 30, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 16px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
            transition: transform 120ms ease-out, opacity 140ms ease-out;
        }

        .liquid-tile-fast {
            background: rgba(14, 20, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 4px 10px rgba(0,0,0,0.32), inset 0 1px 2px rgba(255,255,255,0.06);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
            transition: transform 120ms ease-out, opacity 140ms ease-out;
        }

        .tile-animating {
            will-change: transform;
        }

        .target-tile {
            background: rgba(5, 10, 15, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
            color: rgba(255, 255, 255, 0.9);
        }

        .target-matched {
            background: rgba(72, 255, 100, 0.3);
            border-color: rgba(100, 255, 150, 0.6);
            box-shadow: 0 0 20px rgba(72, 255, 100, 0.4), inset 0 2px 8px rgba(0,0,0,0.4);
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .swap-armed {
            border-color: rgba(255, 255, 255, 0.52);
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.2), inset 0 2px 8px rgba(0,0,0,0.45);
            transform: scale(1.02);
        }

        @keyframes targetSwapFlip {
            0% { transform: rotateY(0deg); }
            49% { transform: rotateY(90deg); }
            50% { transform: rotateY(-90deg); }
            100% { transform: rotateY(0deg); }
        }

        .target-swap-anim {
            animation: targetSwapFlip 240ms cubic-bezier(0.24, 0.76, 0.35, 1);
            will-change: transform;
            transform-origin: center center;
            backface-visibility: hidden;
        }

        .swap-armed-icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0.28;
        }

        .swap-armed-icon svg {
            width: 18px;
            height: 18px;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.45));
        }

        .target-number {
            position: relative;
            z-index: 1;
        }

        /* Progress ring */
        .progress-ring__circle {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Cell highlighting for direct mode */
        .col-hover-area:hover {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.1) 100%);
            border-radius: 8px;
        }

        /* Animations */
        @keyframes vibrateAnim {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -1px); }
            80% { transform: translate(2px, 2px); }
        }

        .vibrating-row {
            animation: vibrateAnim 0.08s linear infinite;
            background: rgba(72, 255, 100, 0.4);
            border-color: rgba(100, 255, 150, 0.8);
            box-shadow: 0 0 20px rgba(72, 255, 100, 0.5);
            z-index: 30;
        }

        @keyframes explodeAnim {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; filter: brightness(1.5); }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1.2); opacity: 0; filter: brightness(1); }
        }

        .particle {
            animation: explodeAnim 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // Constants
        const ROWS = 12;
        const COLS = 6;
        const MAX_TICK_MS = 15000;
        const MIN_TICK_MS = 10000;
        const TICK_RAMP_ADVANCES = 20;
        const FALL_SPEED_MS = 800;
        const DIRECT_DROP_ANIM_MS = 220;
        const TARGET_ROW_COUNT = 50;
        const TARGET_RAMP_SOFTENING = 0.5;
        const SERIES_BONUS_POINTS = 1000;
        const ALL_CLEAR_BONUS_POINTS = 500;
        const DEMO_THINK_MS = 420;
        const DEMO_PAUSE_JITTER_MS = 180;
        const DEMO_IMMEDIATE_FACTOR = 0.6;
        const DEMO_LOOKAHEAD_FACTOR = 0.4;
        const CELL_SIZE = 56;
        const PAD = 8;
        const SWAP_START = 2;
        const SWAP_CAP = 3;
        const SWAP_REGEN_MS = 40000;
        const SWAP_ARM_TIMEOUT_MS = 1500;
        const SWAP_FEEDBACK_MS = 1250;
        const SWAP_ANIM_MS = 240;

        const DEMO_WEIGHTS = {
            // Clear priority (still the strongest axis).
            exactMatch: 1450,
            near1: 240,
            near2: 110,
            near3: 36,
            improveGap: 26,
            worsenGap: -68,
            overshootUnit: -52,
            overshootQuad: -6,
            overshootLargeUnit: -66,
            overshootExtremeUnit: -110,
            crampedOvershootPenalty: -90,
            roomyOvershootToleranceBonus: 34,
            constructiveOvershootBonus: 56,
            investedRowBonus: 52,
            junkRowPenalty: -32,
            activeRowBonus: 4,

            // Flexibility, target-band and overcommitment controls.
            mercyRowBonus: 28,
            easyShapeRowBonus: 22,
            hardRowPenalty: -8,
            veryHighUnshapedPenalty: -24,
            preserveMercyPenaltyPerTile: -18,
            preserveMercyLargeTilePenalty: -16,
            overcommitPenaltyUnit: -16,
            flexibilityBandBonus: 26,
            flexibleMixBonus: 34,
            allHighRowsPenalty: -110,
            emergencyRowsPenalty: -68,
            rowSumSpreadPenalty: -4,
            highClusterPenalty: -24,
            shapeableMidHighBonus: 28,
            futureBand6to12Bonus: 26,
            futureBand13to18Bonus: 40,
            futureBand19to24Bonus: 24,

            // Tactical row-capacity awareness (protect fragile last-slot opportunities).
            lastSlotWasteBasePenalty: -640,
            lastSlotNearTargetUnitPenalty: -120,
            lastSlotFlexibleBandPenalty: -130,
            reservedRowRuinPenalty: -1080,
            preserveReservedRowBonus: 840,
            preserveTwoSlotNearRowBonus: 115,
            forecastAdvance1Bonus: 210,
            forecastAdvance2Bonus: 145,
            forecastAdvance3Bonus: 95,
            forecastWaitabilityFailPenalty: -18,
            forecastRoomyWaitBonus: 20,
            forecastCrampedWaitPenalty: -24,

            // Height and stacking safety.
            landedTopDanger: -520,
            heightBase: -22,
            heightSquared: -15,
            maxHeightDanger: -90,
            skylineSpreadPenalty: -20,
            heightSpikePenalty: -26,

            // Functional foundation awareness.
            foundationFillUnit: 44,
            foundationBreadthUnit: 34,
            foundationShelfBonus: 26,
            viableFoundationNearCompleteBonus: 74,
            // Clear quality: prefer lower meaningful clears, but allow stronger cascades to override.
            lowestClearBaseBonus: 220,
            lowestClearDepthUnit: 420,
            deadFloorClearDepthScale: 0.35,
            weakFoundationLowClearBoost: 0.45,
            cascadeExtraRowBonus: 260,
            cascadeDepthBonus: 180,
            cascadeBoardCleanupUnit: 40,
            cascadeFoundationDeltaUnit: 320,
            deadRowClingPenalty: -95,
            deadRowInvestmentPenalty: -150,
            unsupportedUpperMassPenalty: -82,
            topHeavyWeakFoundationPenalty: -72,
            weakFoundationTowerPenalty: -168,
            strongFoundationTowerRelief: 46
        };

        // Tiered heuristic composition:
        // Tier 1 = tactical truths / hard constraints
        // Tier 2 = strategic setups and forward value
        // Tier 3 = soft shaping / aesthetics
        const DEMO_TIER_MULTIPLIERS = {
            tier1: 10,
            tier2: 3,
            tier3: 1
        };

        // Utility
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const lerp = (a, b, t) => a + (b - a) * t;
        const weightedPick = (weightedValues) => {
            const totalWeight = weightedValues.reduce((sum, entry) => sum + entry.weight, 0);
            let roll = Math.random() * totalWeight;
            for (const entry of weightedValues) {
                roll -= entry.weight;
                if (roll <= 0) return entry.value;
            }
            return weightedValues[weightedValues.length - 1].value;
        };
        const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
        // Bias toward smaller digits so players can shape sums incrementally.
        // Optional context applies subtle, probabilistic assistance while preserving plausible randomness.
        const generateTile = ({ rowsClearedTotal = 0, grid = null, conveyor = null, recentTiles = [] } = {}) => {
            const baseWeights = [
                { value: 0, weight: 7 },
                { value: 1, weight: 12 },
                { value: 2, weight: 12 },
                { value: 3, weight: 11 },
                { value: 4, weight: 10 },
                { value: 5, weight: 9 },
                { value: 6, weight: 8 },
                { value: 7, weight: 5 },
                { value: 8, weight: 4 },
                { value: 9, weight: 3 }
            ].map((entry) => ({ ...entry }));

            const adjustWeight = (tileValue, factor) => {
                const found = baseWeights.find((entry) => entry.value === tileValue);
                if (!found) return;
                found.weight = Math.max(0.1, found.weight * factor);
            };

            // Near-miss assist: if a row is close, occasionally tilt probabilities near the needed value.
            if (grid && conveyor && grid.length === ROWS && conveyor.length === ROWS) {
                const nearMissRows = [];
                for (let rowIndex = 0; rowIndex < ROWS; rowIndex++) {
                    const row = grid[rowIndex];
                    const hasTiles = row.some((cell) => cell !== null);
                    if (!hasTiles) continue;
                    const filled = row.reduce((count, cell) => count + (cell !== null ? 1 : 0), 0);
                    const remainingCapacity = COLS - filled;
                    if (remainingCapacity < 1) continue;
                    const currentSum = row.reduce((sum, cell) => sum + (cell !== null ? cell : 0), 0);
                    const diff = conveyor[rowIndex] - currentSum;
                    if (diff >= 1 && diff <= 7) {
                        nearMissRows.push({
                            rowIndex,
                            needed: diff,
                            weight: (8 - diff) * 1.8 + ((rowIndex + 1) * 0.08)
                        });
                    }
                }

                if (nearMissRows.length > 0 && Math.random() < 0.24) {
                    const selected = weightedPick(nearMissRows.map((row) => ({ value: row, weight: row.weight })));
                    const neededValues = [
                        clamp(selected.needed - 1, 0, 9),
                        clamp(selected.needed, 0, 9),
                        clamp(selected.needed + 1, 0, 9)
                    ];
                    neededValues.forEach((value) => adjustWeight(value, 1.45));
                }
            }

            // Anti-sludge guard: in mid/late runs, soften extended low-roll streaks.
            if (rowsClearedTotal >= 16 && recentTiles.length >= 8) {
                const rollingWindow = recentTiles.slice(-10);
                const avg = rollingWindow.reduce((sum, value) => sum + value, 0) / rollingWindow.length;
                const difficulty = getDifficulty(rowsClearedTotal);
                const lowStreakThreshold = 2.9 + (difficulty * 1.4);
                if (avg < lowStreakThreshold) {
                    adjustWeight(0, 0.92);
                    adjustWeight(1, 0.88);
                    adjustWeight(2, 0.88);
                    [5, 6, 7, 8].forEach((value) => adjustWeight(value, 1.12));
                }
            }

            return weightedPick(baseWeights);
        };

        const getDifficulty = (rowsClearedTotal) => Math.min(rowsClearedTotal / TARGET_ROW_COUNT, 1);
        const softenLateWeight = (earlyWeight, lateWeight) => earlyWeight + ((lateWeight - earlyWeight) * TARGET_RAMP_SOFTENING);
        const getTargetWeights = (difficulty) => {
            const earlyWeights = {
                low: 0.15,
                lowMid: 0.40,
                mid: 0.28,
                high: 0.12,
                veryHigh: 0.05
            };
            const lateWeights = {
                low: 0.04,
                lowMid: 0.24,
                mid: 0.34,
                high: 0.24,
                veryHigh: 0.14
            };
            const softenedLateWeights = Object.fromEntries(
                Object.keys(earlyWeights).map((key) => [
                    key,
                    softenLateWeight(earlyWeights[key], lateWeights[key])
                ])
            );

            return {
                low: lerp(earlyWeights.low, softenedLateWeights.low, difficulty),
                lowMid: lerp(earlyWeights.lowMid, softenedLateWeights.lowMid, difficulty),
                mid: lerp(earlyWeights.mid, softenedLateWeights.mid, difficulty),
                high: lerp(earlyWeights.high, softenedLateWeights.high, difficulty),
                veryHigh: lerp(earlyWeights.veryHigh, softenedLateWeights.veryHigh, difficulty)
            };
        };
        const normalizeBucketWeights = (weights) => {
            const total = Object.values(weights).reduce((sum, weight) => sum + weight, 0);
            if (total <= 0) return weights;
            return Object.fromEntries(Object.entries(weights).map(([key, value]) => [key, value / total]));
        };
        const targetBuckets = {
            low: [1, 5],
            lowMid: [6, 12],
            mid: [13, 18],
            high: [19, 24],
            veryHigh: [25, 28]
        };
        const bucketNames = Object.keys(targetBuckets);

        const getBucketForTarget = (value) => (
            bucketNames.find((bucketName) => {
                const [min, max] = targetBuckets[bucketName];
                return value >= min && value <= max;
            }) || null
        );

        const pickDifferentBucket = (weights, currentBucket) => {
            const options = bucketNames
                .filter((bucketName) => bucketName !== currentBucket)
                .map((bucketName) => ({ value: bucketName, weight: Math.max(weights[bucketName] || 0.01, 0.01) }));
            return weightedPick(options);
        };

        const generateTarget = (rowsClearedTotal = 0) => {
            const difficulty = getDifficulty(rowsClearedTotal);
            const weights = normalizeBucketWeights(getTargetWeights(difficulty));
            const selectedBucket = weightedPick([
                { value: 'low', weight: weights.low },
                { value: 'lowMid', weight: weights.lowMid },
                { value: 'mid', weight: weights.mid },
                { value: 'high', weight: weights.high },
                { value: 'veryHigh', weight: weights.veryHigh }
            ]);
            const [min, max] = targetBuckets[selectedBucket];
            return randomInt(min, max);
        };
        const generateTargetExcluding = (excludedValue, rowsClearedTotal = 0) => {
            let nextTarget = generateTarget(rowsClearedTotal);
            while (nextTarget === excludedValue) {
                nextTarget = generateTarget(rowsClearedTotal);
            }
            return nextTarget;
        };
        let lastSwapGenerationMode = null;
        const generateSwapReplacementTarget = (previousValue, rowsClearedTotal = 0, grid = null, conveyor = null, swappedRowIndex = -1) => {
            const difficulty = getDifficulty(rowsClearedTotal);
            const weights = normalizeBucketWeights(getTargetWeights(difficulty));
            const currentBucket = getBucketForTarget(previousValue);
            const fallback = () => generateTargetExcluding(previousValue, rowsClearedTotal);

            // Clean reroll mode (existing behavior): shift to a different target bucket.
            const chooseModeC = () => {
                if (!currentBucket) return fallback();
                for (let attempt = 0; attempt < 6; attempt++) {
                    const nextBucket = pickDifferentBucket(weights, currentBucket);
                    const [min, max] = targetBuckets[nextBucket];
                    const candidate = randomInt(min, max);
                    if (candidate !== previousValue) return candidate;
                }
                return fallback();
            };

            if (!grid || !conveyor || grid.length !== ROWS || conveyor.length !== ROWS) {
                lastSwapGenerationMode = 'clean';
                return chooseModeC();
            }

            const rowContext = [];
            for (let rowIndex = 0; rowIndex < ROWS; rowIndex++) {
                const row = grid[rowIndex];
                const fillCount = row.reduce((count, cell) => count + (cell !== null ? 1 : 0), 0);
                const hasTiles = fillCount > 0;
                if (!hasTiles) continue;
                const sum = row.reduce((running, cell) => running + (cell !== null ? cell : 0), 0);
                const remainingCapacity = COLS - fillCount;
                const target = conveyor[rowIndex];
                rowContext.push({
                    rowIndex,
                    sum,
                    fillCount,
                    remainingCapacity,
                    hasTiles,
                    isDeadRow: (sum + (remainingCapacity * 9)) < target
                });
            }

            const swappedRow = rowContext.find((row) => row.rowIndex === swappedRowIndex) || null;
            const lowerRows = rowContext.filter((row) => row.rowIndex > swappedRowIndex);

            const clutchWeight = lastSwapGenerationMode === 'clutch' ? 0.035 : 0.07;
            const assistWeight = 0.40;
            const cleanWeight = 1 - (clutchWeight + assistWeight);
            const selectedMode = weightedPick([
                { value: 'clutch', weight: clutchWeight },
                { value: 'assist', weight: assistWeight },
                { value: 'clean', weight: cleanWeight }
            ]);

            if (selectedMode === 'clutch' && swappedRow && swappedRow.hasTiles && swappedRow.sum !== previousValue) {
                lastSwapGenerationMode = 'clutch';
                return swappedRow.sum;
            }

            if (selectedMode === 'assist') {
                const assistCandidates = lowerRows.map((row) => {
                    let weight = 1 + (row.fillCount * 0.35);
                    if (row.isDeadRow) weight += 5;
                    weight += (1 / (row.remainingCapacity + 0.75)) * 2.2;
                    return { value: row, weight };
                });
                if (assistCandidates.length > 0) {
                    const pickedRow = weightedPick(assistCandidates);
                    if (pickedRow.sum !== previousValue) {
                        lastSwapGenerationMode = 'assist';
                        return pickedRow.sum;
                    }
                }
            }

            lastSwapGenerationMode = 'clean';
            return chooseModeC();
        };
        const createConveyorTargets = (rowsClearedTotal = 0) => {
            const targets = [];
            for (let i = 0; i < ROWS; i++) {
                targets.push(generateTargetExcluding(i > 0 ? targets[i - 1] : null, rowsClearedTotal));
            }
            return targets;
        };
        const createEmptyGrid = () => Array.from({ length: ROWS }, () => Array(COLS).fill(null));
        const triangularSeriesByTarget = {
            3: [1, 2],
            6: [1, 2, 3],
            10: [1, 2, 3, 4],
            15: [1, 2, 3, 4, 5],
            21: [1, 2, 3, 4, 5, 6],
            28: [1, 2, 3, 4, 5, 6, 7]
        };
        const qualifiesForSeriesBonus = (rowValues, target) => {
            const requiredSeries = triangularSeriesByTarget[target];
            if (!requiredSeries) return false;

            // Ignore empty cells/nulls and allow zeros as filler.
            const presentValues = new Set(rowValues.filter((value) => value !== null && value !== 0));
            return requiredSeries.every((requiredValue) => presentValues.has(requiredValue));
        };
        const isAllClear = (sourceGrid) => sourceGrid.every((row) => row.every((cell) => cell === null));

        const ProgressRing = React.memo(({ durationMs, running, cycleNonce }) => {
            const circleRef = useRef(null);
            const secondsRef = useRef(null);
            const rafRef = useRef(null);
            const durationRef = useRef(durationMs);
            const CIRCUMFERENCE = 125.66;

            useEffect(() => {
                durationRef.current = durationMs;
            }, [durationMs]);

            useEffect(() => {
                if (!circleRef.current || !secondsRef.current) return undefined;

                const circle = circleRef.current;
                const seconds = secondsRef.current;
                const startTime = performance.now();
                let lastShownSecond = null;

                const paint = (now) => {
                    const elapsed = now - startTime;
                    const duration = Math.max(durationRef.current, 1);
                    const progress = Math.min(elapsed / duration, 1);
                    circle.style.strokeDashoffset = String(CIRCUMFERENCE - (progress * CIRCUMFERENCE));
                    const secondsLeft = Math.max(0, Math.ceil((duration - elapsed) / 1000));
                    if (secondsLeft !== lastShownSecond) {
                        seconds.textContent = `${secondsLeft}s`;
                        lastShownSecond = secondsLeft;
                    }
                    if (progress < 1 && running) {
                        rafRef.current = requestAnimationFrame(paint);
                    }
                };

                circle.style.strokeDashoffset = '0';
                seconds.textContent = `${Math.ceil(durationRef.current / 1000)}s`;
                if (running) {
                    rafRef.current = requestAnimationFrame(paint);
                }

                return () => {
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                    rafRef.current = null;
                };
            }, [running, cycleNonce]);

            return (
                <div className="relative w-12 h-12 flex items-center justify-center">
                    <svg width="48" height="48" className="rotate-90">
                        <circle cx="24" cy="24" r="20" fill="transparent" stroke="rgba(255,255,255,0.05)" strokeWidth="4" />
                        <circle
                            ref={circleRef}
                            cx="24" cy="24" r="20"
                            fill="transparent"
                            stroke="rgba(255,255,255,0.8)"
                            strokeWidth="4"
                            strokeDasharray={CIRCUMFERENCE}
                            strokeDashoffset="0"
                            className="progress-ring__circle drop-shadow-md"
                        />
                    </svg>
                    <div ref={secondsRef} className="absolute font-bold text-xs text-white" />
                </div>
            );
        });

        const App = () => {
            const initialTargetState = useRef((() => {
                const conveyor = createConveyorTargets();
                return { conveyor, incoming: generateTargetExcluding(conveyor[0]) };
            })());

            // Game State
            const [grid, setGrid] = useState(createEmptyGrid());
            const [activeTile, setActiveTile] = useState(null);
            const [queue, setQueue] = useState([generateTile(), generateTile()]);
            const recentTilesRef = useRef([...queue]);
            const [conveyor, setConveyor] = useState(initialTargetState.current.conveyor);
            const [incomingTarget, setIncomingTarget] = useState(initialTargetState.current.incoming);
            const [conveyorAnim, setConveyorAnim] = useState(false);
            const [conveyorAnimShift, setConveyorAnimShift] = useState(1);
            const [conveyorAnimDuration, setConveyorAnimDuration] = useState(400);
            const [mode, setMode] = useState('direct');
            const [gameOver, setGameOver] = useState(false);
            const [score, setScore] = useState(0);
            const [rowsClearedTotal, setRowsClearedTotal] = useState(0);
            const [guideOpen, setGuideOpen] = useState(true);
            const [animatingDrop, setAnimatingDrop] = useState(null);
            const [demoMode, setDemoMode] = useState(false);

            // Timing & FX state
            const [tickCycle, setTickCycle] = useState(0);
            const [clearingRows, setClearingRows] = useState([]);
            const [explodingParticles, setExplodingParticles] = useState([]);
            const [comboText, setComboText] = useState('');
            const [uiScale, setUiScale] = useState(1);
            const [advanceCount, setAdvanceCount] = useState(0);
            const [resolvingRows, setResolvingRows] = useState([]);
            const [swapsAvailable, setSwapsAvailable] = useState(SWAP_START);
            const [swapRegenElapsedMs, setSwapRegenElapsedMs] = useState(0);
            const [swapFeedback, setSwapFeedback] = useState(null);
            const [armedSwapRow, setArmedSwapRow] = useState(null);
            const [swapAnimatingRows, setSwapAnimatingRows] = useState({});
            const [pendingSwapValues, setPendingSwapValues] = useState({});

            // Refs
            const stateRef = useRef({ grid, activeTile, conveyor, incomingTarget, mode, gameOver, queue, guideOpen, advanceCount, animatingDrop, demoMode, conveyorAnim, clearingRows, explodingParticles, score, rowsClearedTotal, swapsAvailable, swapRegenElapsedMs, resolvingRows, swapAnimatingRows });
            const tickTimerRef = useRef(null);
            const frameRef = useRef(null);
            const directDropCommitRef = useRef(null);
            const demoTimerRef = useRef(null);
            const resolvePendingRef = useRef(false);
            const resolvingRowsRef = useRef(false);
            const allClearAwardedOnEmptyRef = useRef(false);
            const swapRegenTickRef = useRef(null);
            const armedSwapTimerRef = useRef(null);
            const swapFeedbackTimerRef = useRef(null);
            const swapMidpointTimersRef = useRef({});
            const swapEndTimersRef = useRef({});
            const demoSwapPauseUntilRef = useRef(0);

            const drawNextTile = useCallback((contextOverrides = {}) => {
                const current = stateRef.current;
                const nextTile = generateTile({
                    rowsClearedTotal: contextOverrides.rowsClearedTotal ?? current.rowsClearedTotal,
                    grid: contextOverrides.grid ?? current.grid,
                    conveyor: contextOverrides.conveyor ?? current.conveyor,
                    recentTiles: recentTilesRef.current
                });
                recentTilesRef.current = [...recentTilesRef.current, nextTile].slice(-10);
                return nextTile;
            }, []);

            useEffect(() => {
                stateRef.current = { grid, activeTile, conveyor, incomingTarget, mode, gameOver, queue, guideOpen, advanceCount, animatingDrop, demoMode, conveyorAnim, clearingRows, explodingParticles, score, rowsClearedTotal, swapsAvailable, swapRegenElapsedMs, resolvingRows, swapAnimatingRows };
            }, [grid, activeTile, conveyor, incomingTarget, mode, gameOver, queue, guideOpen, advanceCount, animatingDrop, demoMode, conveyorAnim, clearingRows, explodingParticles, score, rowsClearedTotal, swapsAvailable, swapRegenElapsedMs, resolvingRows, swapAnimatingRows]);

            const cancelArmedSwap = useCallback(() => {
                clearTimeout(armedSwapTimerRef.current);
                armedSwapTimerRef.current = null;
                setArmedSwapRow(null);
            }, []);

            const armSwapRow = useCallback((rowIndex) => {
                clearTimeout(armedSwapTimerRef.current);
                setArmedSwapRow(rowIndex);
                armedSwapTimerRef.current = setTimeout(() => {
                    setArmedSwapRow((currentArmed) => (currentArmed === rowIndex ? null : currentArmed));
                    armedSwapTimerRef.current = null;
                }, SWAP_ARM_TIMEOUT_MS);
            }, []);

            useEffect(() => {
                if (!conveyorAnim && resolvePendingRef.current) {
                    requestResolveVisibleMatches();
                }
            }, [conveyorAnim]);

            useEffect(() => {
                if (gameOver || guideOpen || demoMode || conveyorAnim) {
                    cancelArmedSwap();
                }
            }, [gameOver, guideOpen, demoMode, conveyorAnim, cancelArmedSwap]);

            // Unified Spawner
            const spawnTileForSliding = () => {
                if (stateRef.current.mode === 'sliding') {
                    if (stateRef.current.grid[0][2] !== null) {
                        setGameOver(true);
                        return;
                    }
                    setActiveTile({ x: 2, y: 0, val: stateRef.current.queue[0] });
                    setQueue(prev => [prev[1], drawNextTile()]);
                }
            };

            const getRowSumFromGrid = (sourceGrid, rowIndex) => sourceGrid[rowIndex].reduce((sum, cell) => sum + (cell !== null ? cell : 0), 0);

            const rowHasTiles = (sourceGrid, rowIndex) => sourceGrid[rowIndex].some(cell => cell !== null);
            const getRowFilledCount = (sourceGrid, rowIndex) => sourceGrid[rowIndex].reduce((count, cell) => count + (cell !== null ? 1 : 0), 0);
            const getRowFillCount = (sourceGrid, rowIndex) => getRowFilledCount(sourceGrid, rowIndex);
            const getRowEmptyCount = (sourceGrid, rowIndex) => COLS - getRowFilledCount(sourceGrid, rowIndex);
            const getRowPositiveValues = (sourceGrid, rowIndex) => sourceGrid[rowIndex].filter(cell => cell !== null && cell > 0);
            const getRowSumForGrid = (sourceGrid, rowIndex) => getRowSumFromGrid(sourceGrid, rowIndex);
            const getRowGapToTarget = (rowSum, target) => target - rowSum;
            const isLastSlotMove = (sourceGrid, rowIndex) => getRowEmptyCount(sourceGrid, rowIndex) === 1;
            const nextTileExactlyFitsRow = (rowSum, target, nextTile) => (
                nextTile !== undefined && nextTile !== null && (rowSum + nextTile) === target
            );
            const currentTileExactlyFitsRow = (rowSum, target, currentTile) => (
                currentTile !== undefined && currentTile !== null && (rowSum + currentTile) === target
            );

            const getConveyorValueAfterOneStep = (sourceConveyor, sourceIncomingTarget, rowIndex) => (
                rowIndex === 0 ? sourceIncomingTarget : sourceConveyor[rowIndex - 1]
            );

            // Find a meaningful contiguous block (non-empty rows only) where all row sums match targetValue.
            const findContiguousSameSumBlock = (sourceGrid, startRow, targetValue) => {
                if (startRow < 0 || startRow >= ROWS) return null;
                if (!rowHasTiles(sourceGrid, startRow)) return null;
                if (getRowSumFromGrid(sourceGrid, startRow) !== targetValue) return null;

                const prevRow = startRow - 1;
                const previousIsSame = prevRow >= 0
                    && rowHasTiles(sourceGrid, prevRow)
                    && getRowSumFromGrid(sourceGrid, prevRow) === targetValue;
                if (previousIsSame) return null; // Must be top-most row of the contiguous block.

                let endRow = startRow;
                while (endRow + 1 < ROWS) {
                    const nextRow = endRow + 1;
                    if (!rowHasTiles(sourceGrid, nextRow)) break;
                    if (getRowSumFromGrid(sourceGrid, nextRow) !== targetValue) break;
                    endRow = nextRow;
                }

                return {
                    startRow,
                    endRow,
                    length: endRow - startRow + 1,
                    sum: targetValue
                };
            };

            // Determine if this conveyor event should overrun (skip ahead) past a same-sum adjacent block.
            const getConveyorAdvanceDistance = (sourceGrid, sourceConveyor, sourceIncomingTarget) => {
                for (let row = 0; row < ROWS; row++) {
                    const wouldLandTarget = getConveyorValueAfterOneStep(sourceConveyor, sourceIncomingTarget, row);
                    const block = findContiguousSameSumBlock(sourceGrid, row, wouldLandTarget);
                    if (block && block.length >= 2) {
                        return { distance: block.length, block };
                    }
                }
                return { distance: 1, block: null };
            };

            const getConveyorAnimationDuration = (shiftCount) => (
                shiftCount === 1
                    ? 400
                    : Math.min(760, 260 + (shiftCount * 120))
            );

            const buildConveyorAdvanceResult = (sourceConveyor, sourceIncomingTarget, shiftCount, rowsClearedCount) => {
                let nextConveyor = [...sourceConveyor];
                let nextIncoming = sourceIncomingTarget;
                for (let i = 0; i < shiftCount; i++) {
                    nextConveyor = [nextIncoming, ...nextConveyor.slice(0, -1)];
                    nextIncoming = generateTargetExcluding(nextConveyor[0], rowsClearedCount);
                }
                return { nextConveyor, nextIncoming };
            };

            // For demo forecasting we only trust concrete, currently visible targets:
            // the conveyor itself plus the current incoming target above it.
            const buildKnownTargetPool = (sourceConveyor, sourceIncomingTarget) => (
                [...sourceConveyor, sourceIncomingTarget]
            );

            const advanceConveyorForecastState = (sourceGrid, forecastState) => {
                if (!forecastState || forecastState.knownDepleted) {
                    return { ...forecastState, knownDepleted: true };
                }

                const shiftInfo = getConveyorAdvanceDistance(sourceGrid, forecastState.conveyor, forecastState.incomingTarget);
                const shiftCount = shiftInfo.distance;
                let nextConveyor = [...forecastState.conveyor];
                let poolIndex = forecastState.poolIndex;
                let incoming = forecastState.incomingTarget;

                for (let i = 0; i < shiftCount; i++) {
                    if (incoming === null || incoming === undefined) {
                        return { ...forecastState, knownDepleted: true };
                    }
                    nextConveyor = [incoming, ...nextConveyor.slice(0, -1)];
                    poolIndex += 1;
                    incoming = poolIndex < forecastState.knownPool.length ? forecastState.knownPool[poolIndex] : null;
                }

                return {
                    conveyor: nextConveyor,
                    incomingTarget: incoming,
                    knownPool: forecastState.knownPool,
                    poolIndex,
                    knownDepleted: false
                };
            };

            const getTargetForRowAfterAdvances = (sourceGrid, sourceConveyor, sourceIncomingTarget, rowIndex, advanceCount) => {
                if (advanceCount <= 0) return sourceConveyor[rowIndex];
                let forecastState = {
                    conveyor: [...sourceConveyor],
                    incomingTarget: sourceIncomingTarget,
                    knownPool: buildKnownTargetPool(sourceConveyor, sourceIncomingTarget),
                    poolIndex: sourceConveyor.length,
                    knownDepleted: false
                };

                for (let step = 0; step < advanceCount; step++) {
                    forecastState = advanceConveyorForecastState(sourceGrid, forecastState);
                    if (forecastState.knownDepleted) return null;
                }
                return forecastState.conveyor[rowIndex];
            };

            const getUpcomingTargetsForRow = (sourceGrid, sourceConveyor, sourceIncomingTarget, rowIndex, maxAdvances = 3) => {
                const upcoming = [];
                for (let advancesAway = 1; advancesAway <= maxAdvances; advancesAway++) {
                    const target = getTargetForRowAfterAdvances(
                        sourceGrid,
                        sourceConveyor,
                        sourceIncomingTarget,
                        rowIndex,
                        advancesAway
                    );
                    upcoming.push({ advancesAway, target });
                    if (target === null || target === undefined) break;
                }
                return upcoming;
            };

            const rowCanReasonablyWaitForTarget = (sourceGrid, rowIndex, rowSum, target, advancesAway) => {
                if (target === null || target === undefined || rowSum !== target) {
                    return { canWait: false, stability: 0 };
                }

                const emptyCount = getRowEmptyCount(sourceGrid, rowIndex);
                if (emptyCount === 0) return { canWait: false, stability: 0 };

                let stability = emptyCount >= 3 ? 1 : emptyCount === 2 ? 0.76 : 0.42;
                if (advancesAway === 2 && emptyCount === 1) stability *= 0.72;
                if (advancesAway >= 3 && emptyCount <= 1) stability *= 0.58;

                if (rowSum >= 25 && emptyCount <= 1) stability *= 0.52;
                if (rowSum <= 5 && advancesAway >= 3) stability *= 0.84;

                return { canWait: stability >= 0.33, stability };
            };

            const getConveyorForecastBonus = ({
                sourceGrid,
                sourceConveyor,
                sourceIncomingTarget,
                rowIndex,
                rowSum
            }) => {
                if (!rowHasTiles(sourceGrid, rowIndex)) return 0;

                const upcoming = getUpcomingTargetsForRow(sourceGrid, sourceConveyor, sourceIncomingTarget, rowIndex, 3);
                let bonus = 0;

                for (const { advancesAway, target } of upcoming) {
                    if (target === null || target === undefined || target !== rowSum) continue;

                    const wait = rowCanReasonablyWaitForTarget(sourceGrid, rowIndex, rowSum, target, advancesAway);
                    const base = advancesAway === 1
                        ? DEMO_WEIGHTS.forecastAdvance1Bonus
                        : advancesAway === 2
                            ? DEMO_WEIGHTS.forecastAdvance2Bonus
                            : DEMO_WEIGHTS.forecastAdvance3Bonus;

                    if (wait.canWait) {
                        bonus += base * wait.stability;
                        const emptyCount = getRowEmptyCount(sourceGrid, rowIndex);
                        if (emptyCount >= 3) bonus += DEMO_WEIGHTS.forecastRoomyWaitBonus;
                        if (emptyCount === 1 && advancesAway >= 2) bonus += DEMO_WEIGHTS.forecastCrampedWaitPenalty;
                    } else {
                        bonus += DEMO_WEIGHTS.forecastWaitabilityFailPenalty;
                    }
                    break; // Use nearest concrete upcoming match only.
                }

                return bonus;
            };

            const rowCanReasonablyClearSoon = (sourceGrid, rowSum, rowIndex, sourceConveyor, sourceIncomingTarget, difficulty) => {
                if (!rowHasTiles(sourceGrid, rowIndex)) return false;

                const emptyCount = getRowEmptyCount(sourceGrid, rowIndex);
                const fillCount = getRowFillCount(sourceGrid, rowIndex);
                const targetNow = sourceConveyor[rowIndex];
                const gapNow = Math.abs(targetNow - rowSum);

                if (rowSum === targetNow) return true;
                if (gapNow <= 2 && emptyCount >= 1) return true;
                if (gapNow <= 4 && emptyCount >= 2 && rowSum <= 24) return true;

                const upcoming = getUpcomingTargetsForRow(sourceGrid, sourceConveyor, sourceIncomingTarget, rowIndex, 3);
                for (const { advancesAway, target } of upcoming) {
                    if (target === null || target === undefined || target !== rowSum) continue;
                    const wait = rowCanReasonablyWaitForTarget(sourceGrid, rowIndex, rowSum, target, advancesAway);
                    if (wait.canWait && wait.stability >= 0.4) return true;
                }

                // Conservative fallback: a still-roomy row might be reshaped into target soon.
                return fillCount <= 4 && emptyCount >= 2 && gapNow <= Math.round(lerp(4, 6, difficulty));
            };

            const isDeadRow = (sourceGrid, rowSum, rowIndex, sourceConveyor, sourceIncomingTarget, difficulty) => {
                if (!rowHasTiles(sourceGrid, rowIndex)) return false;

                const fillCount = getRowFillCount(sourceGrid, rowIndex);
                const emptyCount = getRowEmptyCount(sourceGrid, rowIndex);
                const targetNow = sourceConveyor[rowIndex];
                const absGap = Math.abs(targetNow - rowSum);
                const positiveValues = getRowPositiveValues(sourceGrid, rowIndex);
                const concentrated = positiveValues.length > 0 && positiveValues.reduce((a, b) => a + b, 0) >= 20;
                const barelyShapeable = emptyCount <= 1 || (emptyCount === 2 && rowSum >= 22);
                const cramped = fillCount >= COLS - 1;
                const likelyClearSoon = rowCanReasonablyClearSoon(
                    sourceGrid,
                    rowSum,
                    rowIndex,
                    sourceConveyor,
                    sourceIncomingTarget,
                    difficulty
                );

                // Dead rows are cramped, not currently matching, and unlikely to clear shortly.
                return (
                    rowSum !== targetNow
                    && !likelyClearSoon
                    && cramped
                    && barelyShapeable
                    && (absGap >= 4 || concentrated)
                );
            };

            const getActiveFoundationStartRow = (sourceGrid, sourceConveyor, sourceIncomingTarget, difficulty) => {
                // Promote upwards when lower rows become effectively dead.
                for (let row = ROWS - 1; row >= 0; row--) {
                    if (!rowHasTiles(sourceGrid, row)) continue;
                    const rowSum = getRowSumForGrid(sourceGrid, row);
                    const dead = isDeadRow(sourceGrid, rowSum, row, sourceConveyor, sourceIncomingTarget, difficulty);
                    if (!dead) return row;
                }

                // If all occupied lower rows are dead (or board is very empty), anchor near physical bottom.
                return ROWS - 1;
            };

            const getFoundationRows = (sourceGrid, activeFoundationStartRow, count = 4) => {
                const rows = [];
                for (let offset = 0; offset < count; offset++) {
                    const row = activeFoundationStartRow - offset;
                    if (row < 0 || row >= ROWS) break;
                    rows.push(row);
                }
                return rows;
            };

            // Intended rule: a row clears when it has at least one tile and its sum
            // equals the row's currently visible conveyor target.
            const findMatchingRows = (sourceGrid, sourceConveyor) => {
                const matches = [];
                for (let r = 0; r < ROWS; r++) {
                    const hasTiles = sourceGrid[r].some(cell => cell !== null);
                    if (!hasTiles) continue;
                    const rowSum = getRowSumFromGrid(sourceGrid, r);
                    if (rowSum === sourceConveyor[r]) matches.push(r);
                }
                return matches;
            };

            const getClearedRowsForMove = (sourceGrid, sourceConveyor) => (
                findMatchingRows(sourceGrid, sourceConveyor)
            );

            const getLowestClearedRowIndex = (clearedRows) => (
                clearedRows.length ? Math.max(...clearedRows) : -1
            );

            const collapseGridForClearedRows = (sourceGrid, clearedRows) => {
                if (!clearedRows.length) return sourceGrid.map(row => [...row]);
                const nextGrid = sourceGrid.filter((_, idx) => !clearedRows.includes(idx)).map(row => [...row]);
                for (let i = 0; i < clearedRows.length; i++) nextGrid.unshift(Array(COLS).fill(null));
                return nextGrid;
            };

            const getOccupiedCellCount = (sourceGrid) => sourceGrid.reduce((sum, row) => (
                sum + row.reduce((rowSum, cell) => rowSum + (cell !== null ? 1 : 0), 0)
            ), 0);

            const getStrategicRowDepth = (rowIndex, activeFoundationStartRow) => {
                if (rowIndex <= activeFoundationStartRow) return rowIndex;
                // Rows below the active foundation are partially "dead floor": still relevant, but less strategic.
                return activeFoundationStartRow + ((rowIndex - activeFoundationStartRow) * DEMO_WEIGHTS.deadFloorClearDepthScale);
            };

            const scoreLowestClearPreference = ({
                clearedRows,
                activeFoundationStartRow,
                foundationQuality
            }) => {
                if (!clearedRows.length) return 0;
                const lowestClearRow = getLowestClearedRowIndex(clearedRows);
                if (lowestClearRow < 0) return 0;

                const strategicDepth = getStrategicRowDepth(lowestClearRow, activeFoundationStartRow);
                const normalizedDepth = strategicDepth / Math.max(1, ROWS - 1);
                const weakFoundationBoost = 1 + (Math.max(0, 0.55 - foundationQuality) * DEMO_WEIGHTS.weakFoundationLowClearBoost);
                return (DEMO_WEIGHTS.lowestClearBaseBonus + (normalizedDepth * DEMO_WEIGHTS.lowestClearDepthUnit)) * weakFoundationBoost;
            };

            const scoreClearCascadePotential = ({
                gridAfterDrop,
                sourceConveyor,
                sourceIncomingTarget,
                difficulty,
                foundationBefore
            }) => {
                let workingGrid = gridAfterDrop.map(row => [...row]);
                let totalRowsCleared = 0;
                let cascadeDepth = 0;
                let lowestClearedRow = -1;
                let immediateClears = [];
                const maxCascadeSteps = 3;

                for (let step = 0; step < maxCascadeSteps; step++) {
                    const clearedRows = getClearedRowsForMove(workingGrid, sourceConveyor);
                    if (!clearedRows.length) break;

                    if (step === 0) immediateClears = clearedRows;
                    totalRowsCleared += clearedRows.length;
                    cascadeDepth++;
                    lowestClearedRow = Math.max(lowestClearedRow, getLowestClearedRowIndex(clearedRows));
                    workingGrid = collapseGridForClearedRows(workingGrid, clearedRows);
                }

                if (totalRowsCleared === 0) {
                    return {
                        score: 0,
                        totalRowsCleared: 0,
                        immediateClearCount: 0,
                        cascadeDepth: 0,
                        lowestClearedRow: -1,
                        postCascadeGrid: gridAfterDrop,
                        foundationAfterCascadeQuality: foundationBefore.quality,
                        activeFoundationStartRowAfterCascade: foundationBefore.activeFoundationStartRow
                    };
                }

                const foundationAfter = scoreFoundationDevelopment({
                    sourceGrid: workingGrid,
                    sourceConveyor,
                    sourceIncomingTarget,
                    difficulty
                });
                const occupiedBefore = getOccupiedCellCount(gridAfterDrop);
                const occupiedAfter = getOccupiedCellCount(workingGrid);
                const cleanedCells = Math.max(0, occupiedBefore - occupiedAfter);
                const extraRows = Math.max(0, totalRowsCleared - immediateClears.length);
                const foundationDelta = foundationAfter.quality - foundationBefore.quality;

                let score = 0;
                score += extraRows * DEMO_WEIGHTS.cascadeExtraRowBonus;
                score += Math.max(0, cascadeDepth - 1) * DEMO_WEIGHTS.cascadeDepthBonus;
                score += cleanedCells * DEMO_WEIGHTS.cascadeBoardCleanupUnit;
                if (foundationDelta > 0) score += foundationDelta * DEMO_WEIGHTS.cascadeFoundationDeltaUnit;

                return {
                    score,
                    totalRowsCleared,
                    immediateClearCount: immediateClears.length,
                    cascadeDepth,
                    lowestClearedRow,
                    postCascadeGrid: workingGrid,
                    foundationAfterCascadeQuality: foundationAfter.quality,
                    activeFoundationStartRowAfterCascade: foundationAfter.activeFoundationStartRow
                };
            };

            const compareClearQuality = ({
                cascade,
                activeFoundationStartRow,
                foundationQuality
            }) => {
                if (!cascade || cascade.totalRowsCleared === 0) {
                    return { score: 0, lowestClearScore: 0, cascadeScore: 0 };
                }
                const lowestClearScore = scoreLowestClearPreference({
                    clearedRows: [cascade.lowestClearedRow],
                    activeFoundationStartRow: cascade.activeFoundationStartRowAfterCascade ?? activeFoundationStartRow,
                    foundationQuality: cascade.foundationAfterCascadeQuality ?? foundationQuality
                });
                const cascadeScore = cascade.score;
                return {
                    score: lowestClearScore + cascadeScore,
                    lowestClearScore,
                    cascadeScore
                };
            };

            const requestResolveVisibleMatches = (gridOverride = null, conveyorOverride = null) => {
                const workingGrid = gridOverride || stateRef.current.grid;
                const workingConveyor = conveyorOverride || stateRef.current.conveyor;

                if (resolvingRowsRef.current || stateRef.current.conveyorAnim || stateRef.current.gameOver) {
                    resolvePendingRef.current = true;
                    return;
                }

                const matchingRows = findMatchingRows(workingGrid, workingConveyor);
                if (matchingRows.length === 0) {
                    if (resolvePendingRef.current) {
                        resolvePendingRef.current = false;
                        setTimeout(() => requestResolveVisibleMatches(), 0);
                    }
                    return;
                }

                resolvingRowsRef.current = true;
                resolvePendingRef.current = false;
                cancelArmedSwap();
                setClearingRows(matchingRows);
                setResolvingRows(matchingRows);

                // Evaluate bonuses from pre-clear row content.
                const seriesBonusCount = matchingRows.reduce((count, rowIndex) => (
                    qualifiesForSeriesBonus(workingGrid[rowIndex], workingConveyor[rowIndex]) ? count + 1 : count
                ), 0);
                const cascadeScore = getCascadeScore(matchingRows.length);
                const seriesBonusScore = seriesBonusCount * SERIES_BONUS_POINTS;
                const clearEventScore = cascadeScore + seriesBonusScore;
                setScore((s) => s + clearEventScore);
                setRowsClearedTotal((rows) => rows + matchingRows.length);

                const clearMessages = [];
                if (matchingRows.length > 1) {
                    const comboLabel = matchingRows.length === 2 ? 'DOUBLE CLEAR' : matchingRows.length === 3 ? 'TRIPLE CLEAR' : `CASCADE x${matchingRows.length}`;
                    clearMessages.push(`${comboLabel} +${cascadeScore}`);
                }
                if (seriesBonusCount > 0) {
                    clearMessages.push(`SERIES +${seriesBonusScore}`);
                }
                if (clearMessages.length > 0) {
                    setComboText(clearMessages.join(' • '));
                    setTimeout(() => setComboText(''), 1200);
                }

                const particlesToSpawn = [];
                matchingRows.forEach(y => {
                    workingGrid[y].forEach((cell, x) => {
                        if (cell !== null) {
                            particlesToSpawn.push({
                                id: `p-${x}-${y}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
                                x, y, val: cell,
                                tx: `${randomInt(-200, 200)}px`,
                                ty: `${randomInt(-150, -400)}px`,
                                rot: `${randomInt(-180, 180)}deg`
                            });
                        }
                    });
                });

                setTimeout(() => {
                    setExplodingParticles(prev => [...prev, ...particlesToSpawn]);

                    const collapsedGrid = workingGrid.filter((_, idx) => !matchingRows.includes(idx));
                    for (let i = 0; i < matchingRows.length; i++) {
                        collapsedGrid.unshift(Array(COLS).fill(null));
                    }
                    const boardIsEmpty = isAllClear(collapsedGrid);
                    if (boardIsEmpty) {
                        if (!allClearAwardedOnEmptyRef.current) {
                            setScore((s) => s + ALL_CLEAR_BONUS_POINTS);
                            setComboText(`ALL CLEAR +${ALL_CLEAR_BONUS_POINTS}`);
                            setTimeout(() => setComboText(''), 1200);
                            allClearAwardedOnEmptyRef.current = true;
                        }
                    } else {
                        allClearAwardedOnEmptyRef.current = false;
                    }
                    setGrid(collapsedGrid);
                    setClearingRows([]);

                    setTimeout(() => {
                        setExplodingParticles([]);
                        resolvingRowsRef.current = false;
                        setResolvingRows([]);
                        requestResolveVisibleMatches(collapsedGrid, stateRef.current.conveyor);
                    }, 600);
                }, 1000);
            };

            const lockTile = (x, y, val) => {
                cancelArmedSwap();
                const newGrid = stateRef.current.grid.map(row => [...row]);
                newGrid[y][x] = val;
                allClearAwardedOnEmptyRef.current = false;
                setGrid(newGrid);
                requestResolveVisibleMatches(newGrid, stateRef.current.conveyor);

                if (stateRef.current.mode === 'sliding') {
                    setActiveTile(null);
                } else {
                    setQueue(prev => [prev[1], drawNextTile({ grid: newGrid })]);
                }
            };

            // Game Over Check for Direct Mode
            useEffect(() => {
                if (mode === 'direct' && !gameOver) {
                    const isFull = grid[0].every(cell => cell !== null);
                    if (isFull) setGameOver(true);
                }
            }, [grid, mode, gameOver]);

            // Spawn Trigger for Sliding Mode
            useEffect(() => {
                if (activeTile === null && !gameOver && mode === 'sliding') {
                    setTimeout(spawnTileForSliding, 50);
                }
            }, [activeTile, gameOver, mode]);

            const getLandingRowForColumn = (sourceGrid, colIndex) => {
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (sourceGrid[r][colIndex] === null) return r;
                }
                return -1;
            };

            const getLegalDirectDropColumns = (sourceGrid) => {
                const legal = [];
                for (let col = 0; col < COLS; col++) {
                    if (getLandingRowForColumn(sourceGrid, col) !== -1) legal.push(col);
                }
                return legal;
            };

            const getColumnHeights = (sourceGrid) => {
                const heights = [];
                for (let col = 0; col < COLS; col++) {
                    let firstFilled = ROWS;
                    for (let row = 0; row < ROWS; row++) {
                        if (sourceGrid[row][col] !== null) {
                            firstFilled = row;
                            break;
                        }
                    }
                    heights.push(firstFilled === ROWS ? 0 : ROWS - firstFilled);
                }
                return heights;
            };

            const simulateDirectDropResult = (sourceGrid, colIndex, valToDrop) => {
                const landingRow = getLandingRowForColumn(sourceGrid, colIndex);
                if (landingRow === -1) return null;

                const nextGrid = sourceGrid.map(row => [...row]);
                nextGrid[landingRow][colIndex] = valToDrop;
                return { nextGrid, landingRow, colIndex };
            };

            const getRowBand = (sum) => {
                if (sum <= 5) return 'mercy';
                if (sum <= 12) return 'lowMid';
                if (sum <= 18) return 'midHigh';
                if (sum <= 24) return 'highCommit';
                return 'veryHigh';
            };

            const getRowRoominess = (sourceGrid, rowIndex) => {
                const emptyCount = getRowEmptyCount(sourceGrid, rowIndex);
                if (emptyCount >= 3) return 'roomy';
                if (emptyCount === 2) return 'semi';
                return 'cramped';
            };

            const isRoomyRow = (sourceGrid, rowIndex) => getRowRoominess(sourceGrid, rowIndex) === 'roomy';

            // Positive value for sums that are likely to become useful targets in coming shifts.
            const getFutureBandValue = (rowSum, difficulty, emptyCount) => {
                const spaceFactor = lerp(0.8, 1.12, Math.min(emptyCount, 4) / 4);
                if (rowSum >= 6 && rowSum <= 12) return DEMO_WEIGHTS.futureBand6to12Bonus * spaceFactor;
                if (rowSum >= 13 && rowSum <= 18) return lerp(1.1, 0.92, difficulty) * DEMO_WEIGHTS.futureBand13to18Bonus * spaceFactor;
                if (rowSum >= 19 && rowSum <= 24) return lerp(0.82, 1.0, difficulty) * DEMO_WEIGHTS.futureBand19to24Bonus * spaceFactor;
                return 0;
            };

            // Contextual overshoot: roomy moderate overshoot is tolerable, cramped overshoot is dangerous.
            const getContextualOvershootScore = ({ rowGap, emptyCount, rowSum }) => {
                if (rowGap >= 0) return 0;
                const overshoot = Math.abs(rowGap);
                const roomyFactor = emptyCount >= 3 ? 0.62 : emptyCount === 2 ? 0.9 : 1.4;
                const base = (
                    overshoot * DEMO_WEIGHTS.overshootUnit
                    + (overshoot * overshoot * DEMO_WEIGHTS.overshootQuad)
                ) * roomyFactor;

                let score = base;
                if (overshoot >= 9) score += (overshoot - 8) * DEMO_WEIGHTS.overshootExtremeUnit;
                else if (overshoot >= 6) score += (overshoot - 5) * DEMO_WEIGHTS.overshootLargeUnit;

                const roomyRow = emptyCount >= 3;
                const semiRoomyRow = emptyCount === 2;
                const inUsefulBand = rowSum >= 13 && rowSum <= 24;
                if (overshoot <= 4 && roomyRow) score += DEMO_WEIGHTS.roomyOvershootToleranceBonus;
                if (overshoot <= 4 && inUsefulBand && (roomyRow || semiRoomyRow)) {
                    score += DEMO_WEIGHTS.constructiveOvershootBonus;
                }

                if (emptyCount <= 1 && overshoot >= 3) score += (overshoot - 2) * DEMO_WEIGHTS.crampedOvershootPenalty;
                return score;
            };

            const getBandPreference = (difficulty) => ({
                mercy: lerp(1.2, 0.7, difficulty),
                lowMid: lerp(1.15, 0.85, difficulty),
                midHigh: lerp(0.96, 1.18, difficulty),
                highCommit: lerp(0.72, 1.0, difficulty),
                veryHigh: lerp(0.25, 0.82, difficulty)
            });

            // Row-level proximity score: still rewards clears, but lowers greedy near-match dominance.
            const scoreRowProximity = (sum, target, hasTiles, sourceGrid, rowIndex) => {
                if (!hasTiles) return 0;
                const gap = target - sum;
                const absGap = Math.abs(gap);
                if (gap === 0) return DEMO_WEIGHTS.exactMatch;
                if (gap === 1) return DEMO_WEIGHTS.near1;
                if (gap === 2) return DEMO_WEIGHTS.near2;
                if (gap === 3) return DEMO_WEIGHTS.near3;

                let score = 0;
                if (gap < 0) {
                    const emptyCount = rowIndex !== undefined ? getRowEmptyCount(sourceGrid, rowIndex) : 2;
                    score += getContextualOvershootScore({ rowGap: gap, emptyCount, rowSum: sum });
                } else if (absGap >= 7) {
                    score += DEMO_WEIGHTS.junkRowPenalty * Math.min(absGap - 6, 4);
                }
                return score;
            };

            // Reward rows that remain in reachable bands (mercy + easy-shaping).
            const scoreFlexibilityBands = (rowSum, hasTiles, difficulty, rowGap, emptyCount) => {
                if (!hasTiles) return 0;

                const band = getRowBand(rowSum);
                let score = 0;
                if (band === 'mercy') score += DEMO_WEIGHTS.mercyRowBonus;
                if (band === 'lowMid') score += DEMO_WEIGHTS.easyShapeRowBonus;
                if (band === 'midHigh') score += DEMO_WEIGHTS.hardRowPenalty;
                if (band === 'highCommit' && emptyCount >= 2) score += DEMO_WEIGHTS.shapeableMidHighBonus;
                if (band === 'veryHigh') score += DEMO_WEIGHTS.veryHighUnshapedPenalty;

                const pref = getBandPreference(difficulty);
                score += (pref[band] || 0) * DEMO_WEIGHTS.flexibilityBandBonus;
                score += getFutureBandValue(rowSum, difficulty, emptyCount);

                // Very high rows are less concerning only when near completion.
                if (rowSum > 20 && rowGap > 3) {
                    score += DEMO_WEIGHTS.veryHighUnshapedPenalty;
                }

                return score;
            };

            // Penalize turning mercy rows into larger sums unless we are clearing now.
            const scoreMercyPreservation = (beforeSum, afterSum, target, droppedValue) => {
                if (beforeSum > 5 || afterSum === target) return 0;
                if (afterSum <= 5) return DEMO_WEIGHTS.mercyRowBonus * 0.75;
                const growth = afterSum - beforeSum;
                let penalty = growth * DEMO_WEIGHTS.preserveMercyPenaltyPerTile;
                if (droppedValue >= 6) penalty += DEMO_WEIGHTS.preserveMercyLargeTilePenalty;
                return penalty;
            };

            // Board-level health: prefer mixed low+mid rows and avoid all-hard configurations.
            const scoreBoardHealth = (sourceGrid, sourceConveyor, difficulty) => {
                const rowSums = [];
                let mercyCount = 0;
                let lowMidCount = 0;
                let hardCount = 0;
                let shapeableHardCount = 0;
                let emergencyCount = 0;
                let highClusterCount = 0;
                let prevCrampedHigh = false;

                for (let row = 0; row < ROWS; row++) {
                    if (!rowHasTiles(sourceGrid, row)) continue;
                    const sum = getRowSumFromGrid(sourceGrid, row);
                    const gap = Math.abs(sourceConveyor[row] - sum);
                    const emptyCount = getRowEmptyCount(sourceGrid, row);
                    rowSums.push(sum);
                    if (sum <= 5) mercyCount++;
                    else if (sum <= 12) lowMidCount++;
                    if (sum >= 13) hardCount++;
                    if (sum >= 13 && emptyCount >= 2) shapeableHardCount++;
                    if (sum >= 24 && gap > 5 && emptyCount <= 1) emergencyCount++;

                    const isHigh = sum >= 13;
                    const rowIsCrampedHigh = isHigh && emptyCount <= 1;
                    if (rowIsCrampedHigh && prevCrampedHigh) highClusterCount++;
                    prevCrampedHigh = rowIsCrampedHigh;
                }

                if (!rowSums.length) return 0;

                let score = 0;
                const healthyMix = Math.min(mercyCount, 2) + Math.min(lowMidCount, 3);
                score += healthyMix * DEMO_WEIGHTS.flexibleMixBonus;

                const safeHardBudget = Math.round(lerp(3, 6, difficulty));
                if (hardCount > safeHardBudget) {
                    score += (hardCount - safeHardBudget) * DEMO_WEIGHTS.overcommitPenaltyUnit;
                }

                if (hardCount >= rowSums.length - 1 && shapeableHardCount <= 1) score += DEMO_WEIGHTS.allHighRowsPenalty;
                score += shapeableHardCount * DEMO_WEIGHTS.shapeableMidHighBonus * 0.4;
                score += emergencyCount * DEMO_WEIGHTS.emergencyRowsPenalty;
                score += highClusterCount * DEMO_WEIGHTS.highClusterPenalty;

                const minSum = Math.min(...rowSums);
                const maxSum = Math.max(...rowSums);
                score += (maxSum - minSum) * DEMO_WEIGHTS.rowSumSpreadPenalty;

                return score;
            };

            const scoreFoundationDevelopment = ({
                sourceGrid,
                sourceConveyor,
                sourceIncomingTarget,
                difficulty
            }) => {
                const activeFoundationStartRow = getActiveFoundationStartRow(sourceGrid, sourceConveyor, sourceIncomingTarget, difficulty);
                const foundationRows = getFoundationRows(sourceGrid, activeFoundationStartRow, 4);
                if (!foundationRows.length) return { score: 0, activeFoundationStartRow, foundationRows, quality: 0 };

                let score = 0;
                let totalFillRatio = 0;
                let rowContribution = 0;
                let deadInvestmentRisk = 0;

                foundationRows.forEach((row, idx) => {
                    const rowSum = getRowSumForGrid(sourceGrid, row);
                    const fillCount = getRowFillCount(sourceGrid, row);
                    const fillRatio = fillCount / COLS;
                    const rowWeight = lerp(1.12, 0.78, idx / Math.max(1, foundationRows.length - 1));
                    const isViable = !isDeadRow(sourceGrid, rowSum, row, sourceConveyor, sourceIncomingTarget, difficulty);
                    const rowGap = Math.abs(sourceConveyor[row] - rowSum);

                    if (isViable) {
                        score += fillCount * DEMO_WEIGHTS.foundationFillUnit * rowWeight;
                        if (fillCount >= 4) score += DEMO_WEIGHTS.foundationBreadthUnit * rowWeight;
                        if (fillCount >= 5) score += DEMO_WEIGHTS.foundationShelfBonus * rowWeight;
                        if (fillCount >= 5 && rowGap <= 2) score += DEMO_WEIGHTS.viableFoundationNearCompleteBonus * rowWeight;
                    } else {
                        deadInvestmentRisk += fillCount * (idx === 0 ? 1 : 0.55);
                    }

                    totalFillRatio += fillRatio;
                    rowContribution += rowWeight;
                });

                const avgFillRatio = totalFillRatio / foundationRows.length;
                const quality = Math.min(1, (avgFillRatio * 0.72) + (rowContribution / (foundationRows.length * 1.12) * 0.28));
                score += deadInvestmentRisk * DEMO_WEIGHTS.deadRowInvestmentPenalty;

                return { score, activeFoundationStartRow, foundationRows, quality };
            };

            const scoreFoundationSupport = ({
                sourceGrid,
                activeFoundationStartRow,
                foundationRows,
                foundationQuality
            }) => {
                if (!foundationRows.length) return 0;

                const supportThresholdRow = Math.max(0, activeFoundationStartRow - foundationRows.length);
                let upperMass = 0;
                for (let row = 0; row < supportThresholdRow; row++) {
                    upperMass += getRowFillCount(sourceGrid, row);
                }

                const baseSupportCells = foundationRows.reduce((sum, row) => sum + getRowFillCount(sourceGrid, row), 0);
                const supportRatio = baseSupportCells > 0 ? upperMass / baseSupportCells : upperMass;
                let score = 0;
                if (upperMass > 0 && supportRatio > 0.45) {
                    score += (supportRatio - 0.45) * DEMO_WEIGHTS.unsupportedUpperMassPenalty * 3.2;
                }
                if (upperMass > 0 && foundationQuality < 0.45) {
                    score += (0.45 - foundationQuality) * DEMO_WEIGHTS.topHeavyWeakFoundationPenalty * (1 + (upperMass / 10));
                }
                return score;
            };

            const scoreUnsupportedUpperMass = ({
                sourceGrid,
                activeFoundationStartRow,
                foundationRows,
                foundationQuality
            }) => scoreFoundationSupport({
                sourceGrid,
                activeFoundationStartRow,
                foundationRows,
                foundationQuality
            });

            const scoreTowerOnWeakFoundation = ({ sourceGrid, foundationQuality }) => {
                const heights = getColumnHeights(sourceGrid);
                const maxHeight = Math.max(...heights);
                const avgHeight = heights.reduce((sum, h) => sum + h, 0) / heights.length;
                const spikeStrength = Math.max(0, maxHeight - avgHeight - 1.15);
                if (spikeStrength <= 0) return 0;

                if (foundationQuality < 0.55) {
                    return spikeStrength * DEMO_WEIGHTS.weakFoundationTowerPenalty * (0.6 + (0.55 - foundationQuality));
                }
                return spikeStrength * DEMO_WEIGHTS.strongFoundationTowerRelief * Math.min(0.8, foundationQuality);
            };

            const getReservedRowData = (sourceGrid, sourceConveyor, nextTile) => {
                const reservedRows = [];
                const nearTwoSlotRows = [];

                for (let row = 0; row < ROWS; row++) {
                    if (!rowHasTiles(sourceGrid, row)) continue;
                    const rowSum = getRowSumFromGrid(sourceGrid, row);
                    const gap = getRowGapToTarget(rowSum, sourceConveyor[row]);
                    const emptyCount = getRowEmptyCount(sourceGrid, row);
                    const band = getRowBand(rowSum);
                    const flexibleBand = band === 'mercy' || band === 'lowMid';
                    const isNearTarget = gap > 0 && gap <= 3;

                    if (emptyCount === 1 && nextTileExactlyFitsRow(rowSum, sourceConveyor[row], nextTile)) {
                        reservedRows.push({ row, gap, flexibleBand });
                    } else if (emptyCount === 2 && isNearTarget && flexibleBand) {
                        nearTwoSlotRows.push(row);
                    }
                }

                return { reservedRows, nearTwoSlotRows };
            };

            const scoreRowCapacityTactics = ({ sourceGrid, sourceConveyor, landingRow, afterLandingSum, currentTile, nextTile }) => {
                const rowTarget = sourceConveyor[landingRow];
                const beforeSum = getRowSumFromGrid(sourceGrid, landingRow);
                const beforeGap = Math.abs(getRowGapToTarget(beforeSum, rowTarget));
                const clearsRow = afterLandingSum === rowTarget;
                const { reservedRows, nearTwoSlotRows } = getReservedRowData(sourceGrid, sourceConveyor, nextTile);
                const reservedRowIds = new Set(reservedRows.map(entry => entry.row));

                let score = 0;

                // Strong penalty: do not consume a fragile last slot unless it actually clears.
                if (isLastSlotMove(sourceGrid, landingRow) && !clearsRow) {
                    score += DEMO_WEIGHTS.lastSlotWasteBasePenalty;
                    if (beforeGap <= 3) {
                        score += (4 - beforeGap) * DEMO_WEIGHTS.lastSlotNearTargetUnitPenalty;
                    }

                    const band = getRowBand(beforeSum);
                    if (band === 'mercy' || band === 'lowMid') {
                        score += DEMO_WEIGHTS.lastSlotFlexibleBandPenalty;
                    }

                    // Very strong tactical penalty: if next tile is exact-fit, avoid ruining the setup.
                    if (nextTileExactlyFitsRow(beforeSum, rowTarget, nextTile)) {
                        score += DEMO_WEIGHTS.reservedRowRuinPenalty;
                    }
                }

                // Slightly weaker treatment for two-slot tactical rows that are close and flexible.
                nearTwoSlotRows.forEach(row => {
                    if (row !== landingRow) score += DEMO_WEIGHTS.preserveTwoSlotNearRowBonus;
                });

                // Reward preserving one-gap reserved rows for an exact next-tile clear.
                reservedRows.forEach(({ row, flexibleBand }) => {
                    if (row !== landingRow) {
                        score += DEMO_WEIGHTS.preserveReservedRowBonus;
                    } else if (clearsRow && currentTileExactlyFitsRow(beforeSum, rowTarget, currentTile)) {
                        // If we clear immediately with current tile, this is also tactically sound.
                        score += DEMO_WEIGHTS.preserveReservedRowBonus * 0.35;
                    } else if (flexibleBand) {
                        score += DEMO_WEIGHTS.lastSlotFlexibleBandPenalty * 0.5;
                    }
                });

                // Tiny nudge to avoid disturbing a row that is tactically reserved by lookahead.
                if (reservedRowIds.size > 0 && landingRow !== -1 && !reservedRowIds.has(landingRow)) {
                    score += 18;
                }

                return score;
            };

            const scoreImmediateClears = ({
                sourceGrid,
                nextGrid,
                sourceConveyor,
                landingRow,
                beforeLandingSum,
                afterLandingSum
            }) => {
                const landingTarget = sourceConveyor[landingRow];
                const beforeGap = Math.abs(landingTarget - beforeLandingSum);
                const afterGap = Math.abs(landingTarget - afterLandingSum);
                const landingHadTiles = sourceGrid[landingRow].some(cell => cell !== null);

                let score = 0;
                score += scoreRowProximity(afterLandingSum, landingTarget, true, nextGrid, landingRow);
                score += (beforeGap - afterGap) * DEMO_WEIGHTS.improveGap;
                if (afterGap > beforeGap) score += DEMO_WEIGHTS.worsenGap;
                if (landingHadTiles && afterGap <= beforeGap) score += DEMO_WEIGHTS.investedRowBonus;
