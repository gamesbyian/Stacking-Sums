                return score;
            };

            const scoreConveyorForecast = ({
                sourceGrid,
                sourceConveyor,
                sourceIncomingTarget,
                rowIndex,
                rowSum
            }) => getConveyorForecastBonus({
                sourceGrid,
                sourceConveyor,
                sourceIncomingTarget,
                rowIndex,
                rowSum
            });

            const scoreConstructiveOvershoot = ({
                nextGrid,
                sourceConveyor,
                landingRow,
                afterLandingSum
            }) => {
                const landingTarget = sourceConveyor[landingRow];
                const landingGapSigned = getRowGapToTarget(afterLandingSum, landingTarget);
                const landingEmptyAfter = getRowEmptyCount(nextGrid, landingRow);
                if (landingGapSigned >= 0) return 0;

                const overshoot = Math.abs(landingGapSigned);
                const roomy = isRoomyRow(nextGrid, landingRow);
                if (overshoot <= 4 && (roomy || landingEmptyAfter === 2) && afterLandingSum <= 24) {
                    return DEMO_WEIGHTS.constructiveOvershootBonus;
                }
                return 0;
            };

            const scoreImminentLossAvoidance = ({ nextGrid, landingRow }) => {
                let score = 0;
                const heights = getColumnHeights(nextGrid);
                heights.forEach(h => {
                    if (h >= ROWS - 1) score += DEMO_WEIGHTS.landedTopDanger;
                });
                const topDanger = landingRow <= 2 ? (3 - landingRow) : 0;
                if (topDanger > 0) score += topDanger * DEMO_WEIGHTS.landedTopDanger;
                return score;
            };

            const scoreSkyline = (nextGrid) => {
                let score = 0;
                const heights = getColumnHeights(nextGrid);
                const maxHeight = Math.max(...heights);
                const minHeight = Math.min(...heights);

                heights.forEach(h => {
                    score += (h * DEMO_WEIGHTS.heightBase) + (h * h * DEMO_WEIGHTS.heightSquared);
                });
                score += maxHeight * DEMO_WEIGHTS.maxHeightDanger;
                score += (maxHeight - minHeight) * DEMO_WEIGHTS.skylineSpreadPenalty;
                for (let col = 1; col < COLS; col++) {
                    score += Math.abs(heights[col] - heights[col - 1]) * DEMO_WEIGHTS.heightSpikePenalty;
                }
                return score;
            };

            const scoreCenterBias = (colIndex) => (
                -Math.abs(colIndex - ((COLS - 1) / 2)) * 8
            );

            const evaluateSimulatedMove = (sourceGrid, sourceConveyor, sourceIncomingTarget, simulated, rowsClearedCount, currentTile, nextTile) => {
                if (!simulated) return Number.NEGATIVE_INFINITY;
                const { nextGrid, landingRow, colIndex } = simulated;
                const difficulty = getDifficulty(rowsClearedCount || 0);
                const droppedValue = nextGrid[landingRow][colIndex];

                const beforeLandingSum = getRowSumFromGrid(sourceGrid, landingRow);
                const afterLandingSum = getRowSumFromGrid(nextGrid, landingRow);
                const landingEmptyAfter = getRowEmptyCount(nextGrid, landingRow);
                const landingTarget = sourceConveyor[landingRow];
                const afterGap = Math.abs(landingTarget - afterLandingSum);
                const foundationBefore = scoreFoundationDevelopment({
                    sourceGrid,
                    sourceConveyor,
                    sourceIncomingTarget,
                    difficulty
                });
                const foundationAfter = scoreFoundationDevelopment({
                    sourceGrid: nextGrid,
                    sourceConveyor,
                    sourceIncomingTarget,
                    difficulty
                });
                const clearCascade = scoreClearCascadePotential({
                    gridAfterDrop: nextGrid,
                    sourceConveyor,
                    sourceIncomingTarget,
                    difficulty,
                    foundationBefore: foundationAfter
                });
                const clearQuality = compareClearQuality({
                    cascade: clearCascade,
                    activeFoundationStartRow: foundationAfter.activeFoundationStartRow,
                    foundationQuality: foundationAfter.quality
                });

                let tier1Score = 0;
                let tier2Score = 0;
                let tier3Score = 0;

                // Tier 1: major tactical truths that should dominate tie-breaking concerns.
                tier1Score += scoreImmediateClears({
                    sourceGrid,
                    nextGrid,
                    sourceConveyor,
                    landingRow,
                    beforeLandingSum,
                    afterLandingSum
                });
                const rowCapacitySignal = scoreRowCapacityTactics({
                    sourceGrid,
                    sourceConveyor,
                    landingRow,
                    afterLandingSum,
                    currentTile: currentTile !== undefined && currentTile !== null ? currentTile : droppedValue,
                    nextTile
                });
                tier1Score += rowCapacitySignal;
                tier1Score += scoreImminentLossAvoidance({ nextGrid, landingRow });

                // Tier 2: strategy and setup value.
                tier2Score += scoreFlexibilityBands(afterLandingSum, true, difficulty, afterGap, landingEmptyAfter);
                tier2Score += scoreMercyPreservation(beforeLandingSum, afterLandingSum, landingTarget, droppedValue);
                const landingForecastSignal = scoreConveyorForecast({
                    sourceGrid: nextGrid,
                    sourceConveyor,
                    sourceIncomingTarget,
                    rowIndex: landingRow,
                    rowSum: afterLandingSum
                });
                tier2Score += landingForecastSignal;
                tier2Score += scoreConstructiveOvershoot({
                    nextGrid,
                    sourceConveyor,
                    landingRow,
                    afterLandingSum
                });

                for (let row = 0; row < ROWS; row++) {
                    if (row === landingRow) continue;
                    const rowHasTiles = nextGrid[row].some(cell => cell !== null);
                    const rowSum = getRowSumFromGrid(nextGrid, row);
                    const rowGap = Math.abs(sourceConveyor[row] - rowSum);
                    const rowEmptyCount = getRowEmptyCount(nextGrid, row);
                    tier1Score += scoreRowProximity(rowSum, sourceConveyor[row], rowHasTiles, nextGrid, row) * 0.2;
                    tier2Score += scoreFlexibilityBands(rowSum, rowHasTiles, difficulty, rowGap, rowEmptyCount) * 0.75;
                    tier2Score += scoreConveyorForecast({
                        sourceGrid: nextGrid,
                        sourceConveyor,
                        sourceIncomingTarget,
                        rowIndex: row,
                        rowSum
                    }) * 0.55;
                    if (rowHasTiles) tier2Score += DEMO_WEIGHTS.activeRowBonus;
                }

                tier2Score += scoreBoardHealth(nextGrid, sourceConveyor, difficulty);
                tier2Score += foundationAfter.score;
                tier1Score += clearQuality.lowestClearScore;
                tier2Score += clearQuality.cascadeScore;

                // Structural support: punish top-heavy states and weak-floor towers.
                tier1Score += scoreUnsupportedUpperMass({
                    sourceGrid: nextGrid,
                    activeFoundationStartRow: foundationAfter.activeFoundationStartRow,
                    foundationRows: foundationAfter.foundationRows,
                    foundationQuality: foundationAfter.quality
                });
                tier1Score += scoreTowerOnWeakFoundation({
                    sourceGrid: nextGrid,
                    foundationQuality: foundationAfter.quality
                });

                // If bottom rows are dead and foundation has shifted upward, discourage clinging to dead floor.
                if (foundationAfter.activeFoundationStartRow < ROWS - 1 && landingRow > foundationAfter.activeFoundationStartRow) {
                    const landingDead = isDeadRow(
                        nextGrid,
                        afterLandingSum,
                        landingRow,
                        sourceConveyor,
                        sourceIncomingTarget,
                        difficulty
                    );
                    if (landingDead) tier1Score += DEMO_WEIGHTS.deadRowClingPenalty;
                }

                // Encourage improvement in functional foundation quality over the prior board.
                const foundationQualityDelta = foundationAfter.quality - foundationBefore.quality;
                tier2Score += foundationQualityDelta * (DEMO_WEIGHTS.foundationBreadthUnit * 9);

                // Tier 3: soft shape guidance only.
                tier3Score += scoreSkyline(nextGrid);
                tier3Score += scoreCenterBias(colIndex);

                // Soft priority boosts: strengthen strong strategic truths without brittle if/else rules.
                const hasImmediateClear = afterLandingSum === landingTarget;
                if (hasImmediateClear) tier1Score += DEMO_WEIGHTS.exactMatch * 0.45;
                if (clearCascade.cascadeDepth >= 2) tier2Score += DEMO_WEIGHTS.cascadeDepthBonus * 0.4;

                if (rowCapacitySignal > 0) tier1Score += rowCapacitySignal * 0.2;
                if (landingForecastSignal > 0) tier2Score += landingForecastSignal * 0.25;

                return (
                    tier1Score * DEMO_TIER_MULTIPLIERS.tier1
                    + tier2Score * DEMO_TIER_MULTIPLIERS.tier2
                    + tier3Score * DEMO_TIER_MULTIPLIERS.tier3
                );
            };

            const chooseDemoColumn = (sourceGrid, sourceConveyor, sourceIncomingTarget, currentTile, nextTile, rowsClearedCount) => {
                const legalCols = getLegalDirectDropColumns(sourceGrid);
                if (!legalCols.length) return { col: -1, score: Number.NEGATIVE_INFINITY };

                let bestCol = legalCols[0];
                let bestScore = Number.NEGATIVE_INFINITY;
                legalCols.forEach(col => {
                    const currentSim = simulateDirectDropResult(sourceGrid, col, currentTile);
                    const currentScore = evaluateSimulatedMove(sourceGrid, sourceConveyor, sourceIncomingTarget, currentSim, rowsClearedCount, currentTile, nextTile);

                    let combinedScore = currentScore * DEMO_IMMEDIATE_FACTOR;
                    if (nextTile !== undefined && nextTile !== null && currentSim) {
                        const nextLegalCols = getLegalDirectDropColumns(currentSim.nextGrid);
                        let nextBest = Number.NEGATIVE_INFINITY;
                        nextLegalCols.forEach(nextCol => {
                            const nextSim = simulateDirectDropResult(currentSim.nextGrid, nextCol, nextTile);
                            const nextScore = evaluateSimulatedMove(currentSim.nextGrid, sourceConveyor, sourceIncomingTarget, nextSim, rowsClearedCount, nextTile, null);
                            if (nextScore > nextBest) nextBest = nextScore;
                        });
                        if (nextBest !== Number.NEGATIVE_INFINITY) combinedScore += nextBest * DEMO_LOOKAHEAD_FACTOR;
                    }

                    if (combinedScore > bestScore) {
                        bestScore = combinedScore;
                        bestCol = col;
                    }
                });
                return { col: bestCol, score: bestScore };
            };

            const startDirectDrop = (colIndex) => {
                const { mode, gameOver, guideOpen, animatingDrop, grid, queue } = stateRef.current;
                if (mode !== 'direct' || gameOver || guideOpen || animatingDrop) return false;
                cancelArmedSwap();

                const targetY = getLandingRowForColumn(grid, colIndex);
                if (targetY === -1) return false;

                const valToDrop = queue[0];
                const startOffsetPx = (-1 - targetY) * CELL_SIZE;
                setAnimatingDrop({ x: colIndex, endY: targetY, val: valToDrop, transformY: startOffsetPx });

                requestAnimationFrame(() => {
                    setAnimatingDrop(prev => prev ? { ...prev, transformY: 0 } : prev);
                });

                clearTimeout(directDropCommitRef.current);
                directDropCommitRef.current = setTimeout(() => {
                    lockTile(colIndex, targetY, valToDrop);
                    setAnimatingDrop(null);
                }, DIRECT_DROP_ANIM_MS);

                return true;
            };

            // Interaction: Direct Drop
            const handleColumnClick = (colIndex) => {
                if (stateRef.current.demoMode) return;
                startDirectDrop(colIndex);
            };

            // Interaction: Sliding
            const moveActiveTile = (dx, dy) => {
                const { grid, activeTile } = stateRef.current;
                if (!activeTile || grid === undefined) return false;

                const newX = activeTile.x + dx;
                const newY = activeTile.y + dy;

                if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
                if (newY >= 0 && grid[newY][newX] !== null) return false;

                setActiveTile({ ...activeTile, x: newX, y: newY });
                return true;
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (stateRef.current.mode !== 'sliding' || stateRef.current.gameOver || stateRef.current.guideOpen) return;

                    switch(e.key) {
                        case 'ArrowLeft': moveActiveTile(-1, 0); break;
                        case 'ArrowRight': moveActiveTile(1, 0); break;
                        case 'ArrowDown':
                            if (!moveActiveTile(0, 1)) {
                                const { activeTile } = stateRef.current;
                                if(activeTile) lockTile(activeTile.x, activeTile.y, activeTile.val);
                            }
                            break;
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                if (mode !== 'sliding' || gameOver || guideOpen) return;

                const interval = setInterval(() => {
                    const { activeTile } = stateRef.current;
                    if (activeTile) {
                        if (!moveActiveTile(0, 1)) {
                            lockTile(activeTile.x, activeTile.y, activeTile.val);
                        }
                    }
                }, FALL_SPEED_MS);

                return () => clearInterval(interval);
            }, [mode, gameOver, guideOpen]);

            const getTickDuration = (advances) => {
                const t = Math.min(advances / TICK_RAMP_ADVANCES, 1);
                return Math.round(MAX_TICK_MS - (MAX_TICK_MS - MIN_TICK_MS) * t);
            };

            const canInteractWithSwapRow = useCallback((rowIndex, { allowDemo = false } = {}) => {
                const current = stateRef.current;
                const rowIsResolving = current.clearingRows.includes(rowIndex) || current.resolvingRows.includes(rowIndex);
                return !(
                    current.swapsAvailable <= 0
                    || current.gameOver
                    || current.guideOpen
                    || (!allowDemo && current.demoMode)
                    || current.conveyorAnim
                    || rowIsResolving
                    || resolvingRowsRef.current
                    || current.swapAnimatingRows[rowIndex]
                );
            }, []);

            const showSwapFeedback = useCallback((line1, line2) => {
                clearTimeout(swapFeedbackTimerRef.current);
                setSwapFeedback({ line1, line2, nonce: Date.now() + Math.random() });
                swapFeedbackTimerRef.current = setTimeout(() => {
                    setSwapFeedback(null);
                }, SWAP_FEEDBACK_MS);
            }, []);

            const getSwapSecondsToNext = useCallback(() => {
                const elapsed = stateRef.current.swapRegenElapsedMs;
                return Math.max(1, Math.ceil((SWAP_REGEN_MS - elapsed) / 1000));
            }, []);

            const executeSwapForRow = useCallback((rowIndex, { fromDemo = false } = {}) => {
                if (!canInteractWithSwapRow(rowIndex, { allowDemo: fromDemo })) {
                    if (stateRef.current.swapsAvailable <= 0 && !stateRef.current.demoMode && !stateRef.current.gameOver && !stateRef.current.guideOpen) {
                        const secondsToNext = getSwapSecondsToNext();
                        showSwapFeedback('No swaps', `+1 in ${secondsToNext}s`);
                    }
                    return;
                }

                const oldTarget = stateRef.current.conveyor[rowIndex];
                const replacement = generateSwapReplacementTarget(
                    oldTarget,
                    stateRef.current.rowsClearedTotal,
                    stateRef.current.grid,
                    stateRef.current.conveyor,
                    rowIndex
                );

                clearTimeout(swapMidpointTimersRef.current[rowIndex]);
                clearTimeout(swapEndTimersRef.current[rowIndex]);
                cancelArmedSwap();
                setPendingSwapValues((prev) => ({ ...prev, [rowIndex]: replacement }));
                setSwapAnimatingRows((prev) => ({ ...prev, [rowIndex]: true }));
                setSwapsAvailable((prev) => Math.max(0, prev - 1));
                setSwapRegenElapsedMs((prevElapsed) => (
                    stateRef.current.swapsAvailable === SWAP_CAP ? 0 : prevElapsed
                ));

                swapMidpointTimersRef.current[rowIndex] = setTimeout(() => {
                    setConveyor((prev) => {
                        const next = [...prev];
                        next[rowIndex] = replacement;
                        return next;
                    });
                    setPendingSwapValues((prev) => {
                        const next = { ...prev };
                        delete next[rowIndex];
                        return next;
                    });
                    delete swapMidpointTimersRef.current[rowIndex];
                }, Math.floor(SWAP_ANIM_MS / 2));

                swapEndTimersRef.current[rowIndex] = setTimeout(() => {
                    setSwapAnimatingRows((prev) => {
                        const next = { ...prev };
                        delete next[rowIndex];
                        return next;
                    });
                    delete swapEndTimersRef.current[rowIndex];
                }, SWAP_ANIM_MS);

                const swapsAfterUse = Math.max(0, stateRef.current.swapsAvailable - 1);
                showSwapFeedback('-1 Swap', `${swapsAfterUse} left`);
                return true;
            }, [canInteractWithSwapRow, getSwapSecondsToNext, showSwapFeedback, cancelArmedSwap]);

            const chooseDemoSwapRow = useCallback((current, bestDropChoice) => {
                if (
                    current.swapsAvailable <= 0
                    || current.gameOver
                    || current.guideOpen
                    || current.mode !== 'direct'
                    || current.animatingDrop
                    || current.conveyorAnim
                    || current.clearingRows.length > 0
                    || current.explodingParticles.length > 0
                ) {
                    return null;
                }

                const poorDrop = !bestDropChoice || bestDropChoice.col === -1 || bestDropChoice.score < 380;
                const lowerBandStart = Math.floor(ROWS * 0.58);
                let bestCandidate = null;

                for (let rowIndex = lowerBandStart; rowIndex < ROWS; rowIndex++) {
                    if (!canInteractWithSwapRow(rowIndex, { allowDemo: true })) continue;
                    if (!rowHasTiles(current.grid, rowIndex)) continue;

                    const rowSum = getRowSumFromGrid(current.grid, rowIndex);
                    const currentTarget = current.conveyor[rowIndex];
                    const replacement = generateSwapReplacementTarget(
                        currentTarget,
                        current.rowsClearedTotal,
                        current.grid,
                        current.conveyor,
                        rowIndex
                    );
                    const currentGap = Math.abs(currentTarget - rowSum);
                    const swappedGap = Math.abs(replacement - rowSum);
                    const gapImprovement = currentGap - swappedGap;
                    const immediateHit = replacement === rowSum;
                    const rescueCase = rowIndex >= ROWS - 4 && currentGap >= 4 && swappedGap <= 1;
                    const opportunisticCase = poorDrop && gapImprovement >= 3 && swappedGap <= 2;

                    if (!immediateHit && !rescueCase && !opportunisticCase) continue;

                    let score = gapImprovement * 6;
                    if (immediateHit) score += 90;
                    if (rescueCase) score += 54;
                    if (opportunisticCase) score += 26;
                    score += (rowIndex - lowerBandStart) * 1.5;

                    if (!bestCandidate || score > bestCandidate.score) {
                        bestCandidate = { rowIndex, score };
                    }
                }

                return bestCandidate ? bestCandidate.rowIndex : null;
            }, [canInteractWithSwapRow]);

            const handleConveyorTargetTap = useCallback((rowIndex) => {
                if (stateRef.current.demoMode || stateRef.current.gameOver || stateRef.current.guideOpen) return;
                if (!canInteractWithSwapRow(rowIndex)) {
                    if (stateRef.current.swapsAvailable <= 0) {
                        const secondsToNext = getSwapSecondsToNext();
                        showSwapFeedback('No swaps', `+1 in ${secondsToNext}s`);
                    }
                    return;
                }
                if (armedSwapRow === rowIndex) {
                    executeSwapForRow(rowIndex);
                    return;
                }
                armSwapRow(rowIndex);
            }, [armedSwapRow, executeSwapForRow, canInteractWithSwapRow, getSwapSecondsToNext, showSwapFeedback, armSwapRow]);

            useEffect(() => {
                if (!demoMode || gameOver || guideOpen || mode !== 'direct' || animatingDrop || conveyorAnim || clearingRows.length > 0 || explodingParticles.length > 0) return;

                const now = Date.now();
                const pauseRemaining = Math.max(0, demoSwapPauseUntilRef.current - now);
                const thinkDelay = DEMO_THINK_MS + randomInt(0, DEMO_PAUSE_JITTER_MS) + pauseRemaining;

                demoTimerRef.current = setTimeout(() => {
                    const current = stateRef.current;
                    const bestDrop = chooseDemoColumn(current.grid, current.conveyor, current.incomingTarget, current.queue[0], current.queue[1], current.rowsClearedTotal);
                    const demoSwapRow = chooseDemoSwapRow(current, bestDrop);
                    if (demoSwapRow !== null) {
                        const swapped = executeSwapForRow(demoSwapRow, { fromDemo: true });
                        if (swapped) demoSwapPauseUntilRef.current = Date.now() + 260;
                        return;
                    }
                    if (bestDrop.col !== -1) startDirectDrop(bestDrop.col);
                }, thinkDelay);

                return () => clearTimeout(demoTimerRef.current);
            }, [demoMode, gameOver, guideOpen, mode, animatingDrop, grid, conveyor, queue, conveyorAnim, clearingRows, explodingParticles, chooseDemoSwapRow, executeSwapForRow]);

            useEffect(() => {
                if (gameOver) {
                    cancelArmedSwap();
                    setDemoMode(false);
                }
            }, [gameOver, cancelArmedSwap]);

            const getCascadeScore = (clearedRows) => {
                const base = clearedRows * 100;
                const bonus = clearedRows > 1 ? (clearedRows - 1) * clearedRows * 50 : 0;
                return base + bonus;
            };

            // Conveyor movement: once the shift is visible, resolve matches against the now-visible targets.
            const evaluateRowsAndAdvance = () => {
                const { grid, conveyor, incomingTarget, advanceCount, rowsClearedTotal } = stateRef.current;
                const { distance: shiftCount } = getConveyorAdvanceDistance(grid, conveyor, incomingTarget);
                const animDuration = getConveyorAnimationDuration(shiftCount);

                cancelArmedSwap();
                setConveyorAnimShift(shiftCount);
                setConveyorAnimDuration(animDuration);
                setConveyorAnim(true);

                setTimeout(() => {
                    const { nextConveyor: newConveyor, nextIncoming: newIncomingTarget } = buildConveyorAdvanceResult(conveyor, incomingTarget, shiftCount, rowsClearedTotal);
                    const nextAdvanceCount = advanceCount + shiftCount;

                    setConveyorAnim(false);
                    setConveyor(newConveyor);
                    setIncomingTarget(newIncomingTarget);
                    setAdvanceCount(nextAdvanceCount);
                    requestResolveVisibleMatches(grid, newConveyor);
                }, animDuration); // Conveyor physical slide duration
            };

            const currentTickMs = getTickDuration(advanceCount);

            useEffect(() => {
                if (gameOver || guideOpen) return;
                tickTimerRef.current = setTimeout(() => {
                    setTickCycle((prev) => prev + 1);
                    evaluateRowsAndAdvance();
                }, currentTickMs);
                return () => clearTimeout(tickTimerRef.current);
            }, [gameOver, guideOpen, currentTickMs, tickCycle]);

            useEffect(() => {
                const regenActive = !gameOver && !guideOpen && !demoMode;
                if (!regenActive) return undefined;

                swapRegenTickRef.current = setInterval(() => {
                    const current = stateRef.current;
                    if (current.swapsAvailable >= SWAP_CAP) {
                        if (current.swapRegenElapsedMs !== SWAP_REGEN_MS) {
                            setSwapRegenElapsedMs(SWAP_REGEN_MS);
                        }
                        return;
                    }

                    setSwapRegenElapsedMs((prevElapsed) => {
                        const updatedElapsed = prevElapsed + 250;
                        if (updatedElapsed >= SWAP_REGEN_MS) {
                            setSwapsAvailable((prevSwaps) => Math.min(SWAP_CAP, prevSwaps + 1));
                            return 0;
                        }
                        return updatedElapsed;
                    });
                }, 250);

                return () => clearInterval(swapRegenTickRef.current);
            }, [gameOver, guideOpen, demoMode]);

            const resetGameState = ({ nextDemoMode = false, nextMode = stateRef.current.mode } = {}) => {
                clearTimeout(directDropCommitRef.current);
                clearTimeout(demoTimerRef.current);
                cancelArmedSwap();
                resolvePendingRef.current = false;
                resolvingRowsRef.current = false;
                setGrid(createEmptyGrid());
                const nextConveyor = createConveyorTargets(0);
                setConveyor(nextConveyor);
                setIncomingTarget(generateTargetExcluding(nextConveyor[0], 0));
                setActiveTile(null);
                const firstTile = generateTile();
                const secondTile = generateTile();
                recentTilesRef.current = [firstTile, secondTile];
                setQueue([firstTile, secondTile]);
                setGameOver(false);
                setConveyorAnim(false);
                setConveyorAnimShift(1);
                setConveyorAnimDuration(400);
                setScore(0);
                setTickCycle(0);
                setClearingRows([]);
                setExplodingParticles([]);
                setComboText('');
                setAdvanceCount(0);
                setRowsClearedTotal(0);
                setAnimatingDrop(null);
                setMode(nextMode);
                setDemoMode(nextDemoMode);
                setResolvingRows([]);
                setSwapsAvailable(SWAP_START);
                setSwapRegenElapsedMs(0);
                setSwapFeedback(null);
                setSwapAnimatingRows({});
                setPendingSwapValues({});
                clearInterval(swapRegenTickRef.current);
                clearTimeout(swapFeedbackTimerRef.current);
                Object.values(swapMidpointTimersRef.current).forEach(clearTimeout);
                Object.values(swapEndTimersRef.current).forEach(clearTimeout);
                swapMidpointTimersRef.current = {};
                swapEndTimersRef.current = {};
                demoSwapPauseUntilRef.current = 0;
                allClearAwardedOnEmptyRef.current = false;
                lastSwapGenerationMode = null;
            };

            const restart = () => {
                resetGameState({
                    nextDemoMode: stateRef.current.demoMode,
                    nextMode: stateRef.current.demoMode ? 'direct' : stateRef.current.mode
                });
            };

            const toggleMode = () => {
                if (demoMode) return;
                cancelArmedSwap();
                setMode(prev => prev === 'direct' ? 'sliding' : 'direct');
                setActiveTile(null);
            };

            const toggleDemoMode = () => {
                cancelArmedSwap();
                const isTurningOn = !stateRef.current.demoMode;
                if (isTurningOn) {
                    resetGameState({ nextDemoMode: true, nextMode: 'direct' });
                    return;
                }
                resetGameState({ nextDemoMode: false, nextMode: 'direct' });
            };

            const openGuide = () => {
                cancelArmedSwap();
                setGuideOpen(true);
            };

            const updateUiScale = useCallback(() => {
                const frame = frameRef.current;
                if (!frame) return;

                const availableWidth = window.innerWidth - 16;
                const availableHeight = window.innerHeight - 16;
                const widthScale = availableWidth / frame.offsetWidth;
                const heightScale = availableHeight / frame.offsetHeight;
                const nextScale = Math.min(1, widthScale, heightScale);

                setUiScale(Number.isFinite(nextScale) ? Math.max(nextScale, 0.6) : 1);
            }, []);

            useEffect(() => {
                updateUiScale();
                window.addEventListener('resize', updateUiScale);
                window.addEventListener('orientationchange', updateUiScale);
                return () => {
                    clearTimeout(tickTimerRef.current);
                    clearTimeout(directDropCommitRef.current);
                    clearTimeout(demoTimerRef.current);
                    clearInterval(swapRegenTickRef.current);
                    clearTimeout(armedSwapTimerRef.current);
                    clearTimeout(swapFeedbackTimerRef.current);
                    Object.values(swapMidpointTimersRef.current).forEach(clearTimeout);
                    Object.values(swapEndTimersRef.current).forEach(clearTimeout);
                    window.removeEventListener('resize', updateUiScale);
                    window.removeEventListener('orientationchange', updateUiScale);
                };
            }, [updateUiScale]);

            const gridGuideCells = useMemo(
                () => Array.from({ length: ROWS * COLS }, (_, i) => (
                    <div key={`guide-${i}`} className="border-[0.5px] border-white/5 w-14 h-14 box-border"></div>
                )),
                []
            );

            const directColumns = useMemo(() => Array.from({ length: COLS }, (_, col) => col), []);
            const boardTiles = useMemo(
                () => grid.map((row, y) =>
                    row.map((cell, x) => {
                        if (cell === null) return null;
                        const isClearing = clearingRows.includes(y);
                        return (
                            <div
                                key={`cell-${x}-${y}`}
                                className={`absolute w-12 h-12 m-1 liquid-tile text-xl ${isClearing ? 'vibrating-row' : ''}`}
                                style={{ left: (x * CELL_SIZE) + PAD + 'px', top: (y * CELL_SIZE) + PAD + 'px' }}
                            >
                                {cell}
                            </div>
                        );
                    })
                ),
                [grid, clearingRows]
            );

            const rowDeltaMeta = useMemo(
                () => conveyor.map((target, idx) => {
                    const sum = getRowSumFromGrid(grid, idx);
                    const hasTiles = grid[idx].some(c => c !== null);
                    return { idx, target, sum, hasTiles, difference: Math.abs(target - sum) };
                }),
                [conveyor, grid]
            );

            return (
                <div className="w-screen h-[100svh] flex flex-col items-center justify-center p-2 sm:p-4 overflow-hidden">
                    <div
                        style={{
                            transform: `scale(${uiScale})`,
                            transformOrigin: 'center center',
                            transition: 'transform 180ms ease-out'
                        }}
                    >
                    <div ref={frameRef} className="z-10 w-fit flex flex-col items-stretch max-w-full">

                        {/* Header Area */}
                        <div className="w-full flex items-stretch mb-6 gap-4">
                            {/* Left Pane: Next Tiles */}
                            <div className="liquid-panel px-6 py-3 flex items-center justify-center flex-1">
                                <div className="flex flex-col items-center">
                                    <div className="text-[10px] uppercase tracking-widest opacity-60 mb-2 font-bold text-white">Next Tiles</div>
                                    <div className="flex gap-3 items-center">
                                        <div className="liquid-tile w-12 h-12 text-2xl shadow-[0_0_15px_rgba(255,255,255,0.2)]">
                                            {queue[0]}
                                        </div>
                                        <div className="liquid-tile w-9 h-9 text-lg opacity-50">
                                            {queue[1]}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Middle Pane: Score */}
                            <div className="liquid-panel px-8 py-3 flex flex-col items-center justify-center min-w-[120px]">
                                <div className="text-[10px] uppercase tracking-widest opacity-60 mb-1 font-bold text-white">Score</div>
                                <div className="text-2xl font-bold tracking-tight text-white">{score}</div>
                                <div className={`mt-1 text-[10px] uppercase tracking-[0.14em] text-emerald-200/90 transition-opacity duration-300 ${comboText ? 'opacity-100' : 'opacity-0'}`}>
                                    {comboText || ' '}
                                </div>
                            </div>

                            {/* Right Pane: Conveyor Timer */}
                            <div className="liquid-panel px-8 py-3 flex flex-col items-center justify-center min-w-[120px]">
                                <div className="flex flex-col items-center h-[84px] justify-between">
                                    <div className="text-[10px] uppercase tracking-widest opacity-60 mb-2 font-bold text-white">Conveyor</div>
                                    <div className="relative w-12 h-12">
                                        <div className={`absolute inset-0 transition-opacity duration-150 ${swapFeedback ? 'opacity-0' : 'opacity-100'}`}>
                                            <ProgressRing durationMs={currentTickMs} running={!gameOver && !guideOpen} cycleNonce={tickCycle} />
                                        </div>
                                        <div className={`absolute inset-0 flex flex-col items-center justify-center transition-opacity duration-150 ${swapFeedback ? 'opacity-100' : 'opacity-0'}`}>
                                            <div className="text-[11px] font-semibold leading-none text-white">{swapFeedback ? swapFeedback.line1 : ''}</div>
                                            <div className="text-[9px] leading-none text-white/70 mt-1">{swapFeedback ? swapFeedback.line2 : ''}</div>
                                        </div>
                                    </div>
                                    <div className="h-[12px] mt-1 text-[10px] tracking-wide text-white/60 tabular-nums">
                                        Swaps {swapsAvailable}/{SWAP_CAP}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Main Game Area */}
                        <div className="w-full flex justify-center">
                            <div className="liquid-panel p-2.5 sm:p-3 shadow-2xl">
                                <div className="flex items-start gap-2 sm:gap-2.5">
                                    {/* Left Inner Well: Game Board */}
                                    <div
                                        className="relative bg-black/20 rounded-xl border border-white/10 overflow-hidden"
                                        style={{
                                            width: (COLS * CELL_SIZE) + (PAD * 2) + 'px',
                                            height: (ROWS * CELL_SIZE) + (PAD * 2) + 'px',
                                            padding: `${PAD}px`,
                                            display: 'grid',
                                            gridTemplateColumns: `repeat(${COLS}, ${CELL_SIZE}px)`,
                                            gridTemplateRows: `repeat(${ROWS}, ${CELL_SIZE}px)`
                                        }}
                                    >
                                    {/* Grid guides */}
                                    {gridGuideCells}

                                    {/* Column Interactors */}
                                    {mode === 'direct' && directColumns.map((col) => (
                                        <div
                                            key={`col-${col}`}
                                            className={`absolute w-14 col-hover-area transition-colors z-10 ${demoMode || animatingDrop ? 'cursor-not-allowed opacity-60' : 'cursor-pointer'}`}
                                            style={{ top: `${PAD}px`, bottom: `${PAD}px`, left: (col * CELL_SIZE) + PAD + 'px' }}
                                            onClick={() => handleColumnClick(col)}
                                        />
                                    ))}

                                    {/* Static/Vibrating Grid Tiles */}
                                    {boardTiles}

                                    {/* Player Active Tile (Sliding Mode) */}
                                    {mode === 'sliding' && activeTile && (
                                        <div
                                            className="absolute w-12 h-12 m-1 liquid-tile-fast text-xl border-white/40 shadow-[0_0_14px_rgba(255,255,255,0.2)] z-20"
                                            style={{ left: (activeTile.x * CELL_SIZE) + PAD + 'px', top: (activeTile.y * CELL_SIZE) + PAD + 'px' }}
                                        >
                                            {activeTile.val}
                                        </div>
                                    )}

                                    {/* Direct Drop Animated Tile */}
                                    {mode === 'direct' && animatingDrop && (
                                        <div
                                            className="absolute w-12 h-12 m-1 liquid-tile-fast tile-animating text-xl border-white/35 shadow-[0_0_14px_rgba(255,255,255,0.2)] z-20"
                                            style={{
                                                left: (animatingDrop.x * CELL_SIZE) + PAD + 'px',
                                                top: (animatingDrop.endY * CELL_SIZE) + PAD + 'px',
                                                transform: `translate3d(0, ${animatingDrop.transformY}px, 0)`,
                                                transition: `transform ${DIRECT_DROP_ANIM_MS}ms cubic-bezier(0.2, 0.75, 0.3, 1)`
                                            }}
                                        >
                                            {animatingDrop.val}
                                        </div>
                                    )}

                                    {/* Exploding Particles Layer */}
                                    {explodingParticles.map(p => (
                                        <div
                                            key={p.id}
                                            className="absolute w-12 h-12 m-1 liquid-tile-fast tile-animating text-xl particle"
                                            style={{
                                                left: (p.x * CELL_SIZE) + PAD + 'px',
                                                top: (p.y * CELL_SIZE) + PAD + 'px',
                                                '--tx': p.tx,
                                                '--ty': p.ty,
                                                '--rot': p.rot
                                            }}
                                        >
                                            {p.val}
                                        </div>
                                    ))}
                                </div>

                                    {/* Mid: Row Sum Readout Strip */}
                                    <div
                                        className="flex flex-col justify-start items-center w-[26px] sm:w-[29px] shrink-0"
                                        style={{
                                            height: (ROWS * CELL_SIZE) + (PAD * 2) + 'px',
                                            paddingTop: `${PAD}px`,
                                            paddingBottom: `${PAD}px`
                                        }}
                                    >
                                        {rowDeltaMeta.map(({ idx, sum, hasTiles, difference }) => {
                                            const stateClass = !hasTiles
                                                ? 'text-white/15'
                                                : difference === 0
                                                    ? 'text-emerald-200/95 drop-shadow-[0_0_10px_rgba(100,255,160,0.4)] font-semibold'
                                                    : difference <= 1
                                                        ? 'text-white/80'
                                                        : difference <= 2
                                                            ? 'text-white/60'
                                                            : 'text-white/35';
                                            return (
                                                <div key={`sum-${idx}`} className="h-full flex items-center justify-center" style={{ height: `${CELL_SIZE}px` }}>
                                                    <span className={`text-sm sm:text-base leading-none tracking-tight tabular-nums min-w-[2ch] text-center transition-colors duration-300 ${stateClass}`}>
                                                        {hasTiles ? sum : ''}
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Right Inner Well: Conveyor Targets */}
                                    <div
                                        className="relative flex flex-col bg-black/20 rounded-xl border border-white/10 overflow-hidden w-16"
                                        style={{
                                            height: (ROWS * CELL_SIZE) + (PAD * 2) + 'px',
                                            paddingTop: `${PAD}px`,
                                            paddingBottom: `${PAD}px`
                                        }}
                                    >
                                    <div
                                        className="relative w-full h-full"
                                        style={{
                                            transform: conveyorAnim ? `translateY(${CELL_SIZE * conveyorAnimShift}px)` : 'translateY(0)',
                                            transition: conveyorAnim ? `transform ${conveyorAnimDuration}ms cubic-bezier(0.22, 1, 0.36, 1)` : 'none'
                                        }}
                                    >
                                        <div
                                            className="absolute w-full flex items-center justify-center z-10"
                                            style={{ height: `${CELL_SIZE}px`, top: `-${CELL_SIZE}px` }}
                                        >
                                            <div className="w-12 h-12 rounded-xl flex items-center justify-center target-tile">
                                                <span>{incomingTarget}</span>
                                            </div>
                                        </div>

                                        {rowDeltaMeta.map(({ idx, target, sum, hasTiles }) => {
                                            // Keeps the matched style locked while conveyorAnim is false.
                                            // When vibrating happens, conveyorAnim is false, so it stays lit.
                                            const isMatch = !conveyorAnim && hasTiles && sum === target;
                                            const isResolvingRow = clearingRows.includes(idx) || resolvingRows.includes(idx);
                                            const isSwapAnimating = !!swapAnimatingRows[idx];
                                            const canInteract = !isMatch && !isResolvingRow && !conveyorAnim && !demoMode && !gameOver && !guideOpen && !swapAnimatingRows[idx];

                                            return (
                                                <div
                                                    key={`target-${idx}`}
                                                    className="absolute w-full flex items-center justify-center z-10"
                                                    style={{ height: `${CELL_SIZE}px`, top: `${idx * CELL_SIZE}px` }}
                                                >
                                                    <button
                                                        type="button"
                                                        onClick={() => handleConveyorTargetTap(idx)}
                                                        disabled={!canInteract}
                                                        data-pending-target={pendingSwapValues[idx] ?? ''}
                                                        className={`relative w-12 h-12 rounded-xl flex items-center justify-center transition-colors duration-300 ${isMatch ? 'target-matched' : 'target-tile'} ${armedSwapRow === idx ? 'swap-armed' : ''} ${isSwapAnimating ? 'target-swap-anim' : ''} ${canInteract ? 'cursor-pointer' : 'cursor-default'}`}
                                                    >
                                                        {armedSwapRow === idx && (
                                                            <span className="swap-armed-icon" aria-hidden="true">
                                                                <svg viewBox="0 0 24 24" fill="none">
                                                                    <path d="M19 7.5A7.2 7.2 0 0 0 6.4 5.6" stroke="rgba(255,255,255,0.75)" strokeWidth="1.8" strokeLinecap="round"/>
                                                                    <path d="m5.8 3.8.6 2.8 2.8-.6" stroke="rgba(255,255,255,0.75)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                                                                    <path d="M5 16.5a7.2 7.2 0 0 0 12.6 1.9" stroke="rgba(255,255,255,0.75)" strokeWidth="1.8" strokeLinecap="round"/>
                                                                    <path d="m18.2 20.2-.6-2.8-2.8.6" stroke="rgba(255,255,255,0.75)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                                                                </svg>
                                                            </span>
                                                        )}
                                                        <span className="target-number">{target}</span>
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    <div className="absolute inset-0 pointer-events-none border-l-2 border-r-2 border-white/5 rounded-xl z-20"></div>
                                    <div className="absolute inset-0 pointer-events-none bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSJ0cmFuc3BhcmVudCIvPgo8Y2lyY2xlIGN4PSIxIiBjeT0iMSIgcj0iMSIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjAyKSIvPgo8L3N2Zz4=')] opacity-50 z-20"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Bottom Area: Mode Control */}
                        <div className="w-full flex justify-center mt-6">
                            <div className="liquid-panel px-4 sm:px-6 py-3 flex items-center gap-3 sm:gap-4">
                                <span className="text-[11px] font-bold uppercase tracking-widest opacity-60 text-white">Controls</span>
                                <button
                                    onClick={toggleMode}
                                    disabled={demoMode}
                                    className={`border rounded-full px-4 sm:px-5 py-1.5 text-sm font-medium transition-colors text-white whitespace-nowrap ${demoMode ? 'bg-white/5 border-white/10 opacity-50 cursor-not-allowed' : 'bg-white/10 hover:bg-white/20 border-white/20'}`}
                                >
                                    {mode === 'direct' ? 'Direct Drop' : 'Sliding Placement'}
                                </button>
                                <button
                                    onClick={toggleDemoMode}
                                    className={`border rounded-full px-4 sm:px-5 py-1.5 text-sm font-medium transition-colors text-white whitespace-nowrap ${demoMode ? 'bg-emerald-300/20 border-emerald-200/45 shadow-[0_0_18px_rgba(80,255,160,0.22)]' : 'bg-white/5 hover:bg-white/15 border-white/15'}`}
                                >
                                    {demoMode ? 'Stop Demo' : 'Demo'}
                                </button>
                                <button
                                    onClick={openGuide}
                                    className="bg-white/5 hover:bg-white/15 border border-white/15 rounded-full px-4 sm:px-5 py-1.5 text-sm font-medium transition-colors text-white whitespace-nowrap"
                                >
                                    Guide
                                </button>
                            </div>
                        </div>

                    </div>
                    </div>

                    {/* Guide Modal */}
                    {guideOpen && (
                        <div className="absolute inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-md p-3 sm:p-6">
                            <div className="liquid-panel w-full max-w-2xl max-h-[calc(100svh-1.5rem)] sm:max-h-[calc(100svh-3rem)] flex flex-col overflow-hidden">
                                <button
                                    onClick={() => setGuideOpen(false)}
                                    className="absolute top-4 right-4 z-20 w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 text-white/80 hover:text-white text-lg leading-none flex items-center justify-center transition-colors"
                                    aria-label="Close guide"
                                >
                                    ×
                                </button>

                                <div className="px-5 sm:px-8 pt-6 sm:pt-8 pb-4 border-b border-white/10">
                                    <h2 className="text-3xl sm:text-4xl font-bold tracking-tight text-white">How to Play</h2>
                                    <p className="mt-2 text-sm sm:text-base text-white/80 pr-8">Build row sums that match the moving conveyor targets before the board fills up.</p>
                                </div>

                                <div className="flex-1 overflow-y-auto px-5 sm:px-8 py-5 sm:py-6 space-y-6">
                                    <section>
                                        <h3 className="text-xs uppercase tracking-widest font-bold text-white/60 mb-3">Rules</h3>
                                        <ul className="space-y-2 text-sm sm:text-base text-white/90 leading-relaxed">
                                            <li>• Drop number tiles into the grid.</li>
                                            <li>• Each row has a target value shown on the conveyor to the right.</li>
                                            <li>• The conveyor starts slower and ramps toward a 10-second advance pace as the run progresses.</li>
                                            <li>• If a row’s total exactly matches its current target, that row clears.</li>
                                            <li>• Cleared rows explode and disappear, and everything above falls down.</li>
                                            <li>• The game ends when the grid fills to the top.</li>
                                        </ul>
                                    </section>

                                    <section>
                                        <h3 className="text-xs uppercase tracking-widest font-bold text-white/60 mb-3">Gameplay</h3>
                                        <ul className="space-y-2 text-sm sm:text-base text-white/90 leading-relaxed">
                                            <li>• In Direct Drop mode, click a column to drop the current tile into it.</li>
                                            <li>• In Sliding Placement mode, move the falling tile with the arrow keys.</li>
                                            <li>• You begin with 2 swaps, can store up to 3, and regenerate 1 swap every 40 seconds.</li>
                                            <li>• Double-tap a conveyor target tile to reroll that specific row target.</li>
                                            <li>• Swaps are best saved for awkward rows that are hard to finish.</li>
                                            <li>• Plan ahead using the next-tile preview.</li>
                                            <li>• Set up rows that are close to matching, then use later tiles or falling cascades to finish them.</li>
                                            <li>• Chain reactions can clear multiple rows and score big points.</li>
                                        </ul>
                                    </section>

                                    <section>
                                        <h3 className="text-xs uppercase tracking-widest font-bold text-white/60 mb-3">UI Elements</h3>
                                        <ul className="space-y-2 text-sm sm:text-base text-white/90 leading-relaxed">
                                            <li>• Next Tiles: shows the current tile and the one after it.</li>
                                            <li>• Conveyor Timer: shows when the targets will advance.</li>
                                            <li>• Score: tracks your points.</li>
                                            <li>• Conveyor Targets: the row goals you are trying to match.</li>
                                            <li>• Row Sums: the thin middle column showing each row’s live total.</li>
                                            <li>• Controls: lets you switch between Direct Drop and Sliding Placement.</li>
                                            <li>• Guide: reopens this help screen.</li>
                                        </ul>
                                    </section>
                                </div>

                                <div className="px-5 sm:px-8 py-4 sm:py-5 border-t border-white/10 bg-black/20">
                                    <button
                                        onClick={() => setGuideOpen(false)}
                                        className="w-full bg-white text-gray-900 px-8 py-3 rounded-full font-bold text-lg shadow-[0_4px_14px_0_rgba(255,255,255,0.2)] hover:shadow-[0_6px_20px_rgba(255,255,255,0.3)] hover:bg-opacity-90 transition-all"
                                    >
                                        Play
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Game Over Modal */}
                    {gameOver && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md">
                            <div className="liquid-panel p-10 flex flex-col items-center transform scale-100 transition-all">
                                <h2 className="text-4xl font-bold mb-2 tracking-tight text-white">Game Over</h2>
                                <p className="text-lg opacity-80 mb-8 text-white">Final Score: {score}</p>
                                <button
                                    onClick={restart}
                                    className="bg-white text-gray-900 px-8 py-3 rounded-full font-bold text-lg shadow-[0_4px_14px_0_rgba(255,255,255,0.2)] hover:shadow-[0_6px_20px_rgba(255,255,255,0.3)] hover:bg-opacity-90 transition-all"
                                >
                                    Restart
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
