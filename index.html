<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conveyor Sum</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Smokey Liquid Glass Design System */
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

        :root {
            --glass-bg: rgba(20, 25, 35, 0.65); /* Smokey, dark base */
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 16px 40px 0 rgba(0, 0, 0, 0.5);
            --glass-inner-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #4E65FF, #92EFFD, #FF6B6B, #FF8E53);
            color: white;
            user-select: none;
        }

        .liquid-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow), var(--glass-inner-shadow);
            border-radius: 28px;
            position: relative;
            /* Removed overflow: hidden to allow exploding particles to fly out of the pane */
        }

        .liquid-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 100%);
            border-radius: inherit;
            pointer-events: none;
            z-index: 0;
        }

        /* Elements inside panel need to be relatively positioned to sit above the before-gradient */
        .liquid-panel > * {
            position: relative;
            z-index: 1;
        }

        .liquid-tile {
            background: rgba(15, 20, 30, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 16px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
            transition: transform 0.1s ease, top 0.2s ease, left 0.2s ease;
        }

        .target-tile {
            background: rgba(5, 10, 15, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
            color: rgba(255, 255, 255, 0.9);
        }

        .target-matched {
            background: rgba(72, 255, 100, 0.3);
            border-color: rgba(100, 255, 150, 0.6);
            box-shadow: 0 0 20px rgba(72, 255, 100, 0.4), inset 0 2px 8px rgba(0,0,0,0.4);
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        /* Progress ring */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Cell highlighting for direct mode */
        .col-hover-area:hover {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.1) 100%);
            border-radius: 8px;
        }

        /* Animations */
        @keyframes vibrateAnim {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -1px); }
            80% { transform: translate(2px, 2px); }
        }

        .vibrating-row {
            animation: vibrateAnim 0.08s linear infinite;
            background: rgba(72, 255, 100, 0.4);
            border-color: rgba(100, 255, 150, 0.8);
            box-shadow: 0 0 20px rgba(72, 255, 100, 0.5);
            z-index: 30;
        }

        @keyframes explodeAnim {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; filter: brightness(1.5); }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1.2); opacity: 0; filter: brightness(1); }
        }

        .particle {
            animation: explodeAnim 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Constants
        const ROWS = 12;
        const COLS = 6;
        const MAX_TICK_MS = 15000;
        const MIN_TICK_MS = 10000;
        const TICK_RAMP_ADVANCES = 20;
        const PROGRESS_INTERVAL_MS = 50;
        const FALL_SPEED_MS = 800;
        const DIRECT_DROP_ANIM_MS = 220;
        const DEMO_THINK_MS = 420;
        const DEMO_PAUSE_JITTER_MS = 180;
        const DEMO_LOOKAHEAD_FACTOR = 0.35;
        const CELL_SIZE = 56;
        const PAD = 8;

        const DEMO_WEIGHTS = {
            exactMatch: 1800,
            near1: 380,
            near2: 220,
            near3: 90,
            improveGap: 60,
            worsenGap: -90,
            overshootUnit: -180,
            overshootQuad: -26,
            investedRowBonus: 75,
            junkRowPenalty: -38,
            landedTopDanger: -520,
            heightBase: -28,
            heightSquared: -18,
            maxHeightDanger: -90,
            skylineSpreadBonus: 18,
            activeRowBonus: 8
        };

        // Utility
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const weightedPick = (weightedValues) => {
            const totalWeight = weightedValues.reduce((sum, entry) => sum + entry.weight, 0);
            let roll = Math.random() * totalWeight;
            for (const entry of weightedValues) {
                roll -= entry.weight;
                if (roll <= 0) return entry.value;
            }
            return weightedValues[weightedValues.length - 1].value;
        };
        // Bias toward smaller digits so players can shape sums incrementally.
        const generateTile = () => weightedPick([
            { value: 0, weight: 7 },
            { value: 1, weight: 12 },
            { value: 2, weight: 12 },
            { value: 3, weight: 11 },
            { value: 4, weight: 10 },
            { value: 5, weight: 9 },
            { value: 6, weight: 8 },
            { value: 7, weight: 5 },
            { value: 8, weight: 4 },
            { value: 9, weight: 3 }
        ]);
        // Center targets in a humane mid-range while still allowing occasional high totals.
        const generateTarget = () => weightedPick([
            { value: randomInt(6, 10), weight: 5 },
            { value: randomInt(11, 16), weight: 11 },
            { value: randomInt(17, 22), weight: 8 },
            { value: randomInt(23, 28), weight: 4 }
        ]);
        const createEmptyGrid = () => Array.from({ length: ROWS }, () => Array(COLS).fill(null));

        const App = () => {
            // Game State
            const [grid, setGrid] = useState(createEmptyGrid());
            const [activeTile, setActiveTile] = useState(null);
            const [queue, setQueue] = useState([generateTile(), generateTile()]);
            const [conveyor, setConveyor] = useState(Array.from({ length: ROWS }, generateTarget));
            const [incomingTarget, setIncomingTarget] = useState(generateTarget());
            const [conveyorAnim, setConveyorAnim] = useState(false);
            const [mode, setMode] = useState('direct');
            const [gameOver, setGameOver] = useState(false);
            const [score, setScore] = useState(0);
            const [guideOpen, setGuideOpen] = useState(true);
            const [animatingDrop, setAnimatingDrop] = useState(null);
            const [demoMode, setDemoMode] = useState(false);

            // Timing & FX state
            const [progress, setProgress] = useState(0);
            const [clearingRows, setClearingRows] = useState([]);
            const [explodingParticles, setExplodingParticles] = useState([]);
            const [comboText, setComboText] = useState('');
            const [uiScale, setUiScale] = useState(1);
            const [advanceCount, setAdvanceCount] = useState(0);

            // Refs
            const stateRef = useRef({ grid, activeTile, conveyor, incomingTarget, mode, gameOver, queue, guideOpen, advanceCount, animatingDrop, demoMode, conveyorAnim, clearingRows, explodingParticles });
            const tickTimerRef = useRef(null);
            const frameRef = useRef(null);
            const directDropCommitRef = useRef(null);
            const demoTimerRef = useRef(null);
            const resolvePendingRef = useRef(false);
            const resolvingRowsRef = useRef(false);

            useEffect(() => {
                stateRef.current = { grid, activeTile, conveyor, incomingTarget, mode, gameOver, queue, guideOpen, advanceCount, animatingDrop, demoMode, conveyorAnim, clearingRows, explodingParticles };
            }, [grid, activeTile, conveyor, incomingTarget, mode, gameOver, queue, guideOpen, advanceCount, animatingDrop, demoMode, conveyorAnim, clearingRows, explodingParticles]);

            useEffect(() => {
                if (!conveyorAnim && resolvePendingRef.current) {
                    requestResolveVisibleMatches();
                }
            }, [conveyorAnim]);

            // Unified Spawner
            const spawnTileForSliding = () => {
                if (stateRef.current.mode === 'sliding') {
                    if (stateRef.current.grid[0][2] !== null) {
                        setGameOver(true);
                        return;
                    }
                    setActiveTile({ x: 2, y: 0, val: stateRef.current.queue[0] });
                    setQueue(prev => [prev[1], generateTile()]);
                }
            };

            const getRowSumFromGrid = (sourceGrid, rowIndex) => sourceGrid[rowIndex].reduce((sum, cell) => sum + (cell !== null ? cell : 0), 0);

            // Intended rule: a row clears when it has at least one tile and its sum
            // equals the row's currently visible conveyor target.
            const findMatchingRows = (sourceGrid, sourceConveyor) => {
                const matches = [];
                for (let r = 0; r < ROWS; r++) {
                    const hasTiles = sourceGrid[r].some(cell => cell !== null);
                    if (!hasTiles) continue;
                    const rowSum = getRowSumFromGrid(sourceGrid, r);
                    if (rowSum === sourceConveyor[r]) matches.push(r);
                }
                return matches;
            };

            const requestResolveVisibleMatches = (gridOverride = null, conveyorOverride = null) => {
                const workingGrid = gridOverride || stateRef.current.grid;
                const workingConveyor = conveyorOverride || stateRef.current.conveyor;

                if (resolvingRowsRef.current || stateRef.current.conveyorAnim || stateRef.current.gameOver) {
                    resolvePendingRef.current = true;
                    return;
                }

                const matchingRows = findMatchingRows(workingGrid, workingConveyor);
                if (matchingRows.length === 0) {
                    if (resolvePendingRef.current) {
                        resolvePendingRef.current = false;
                        setTimeout(() => requestResolveVisibleMatches(), 0);
                    }
                    return;
                }

                resolvingRowsRef.current = true;
                resolvePendingRef.current = false;
                setClearingRows(matchingRows);

                const cascadeScore = getCascadeScore(matchingRows.length);
                setScore(s => s + cascadeScore);

                if (matchingRows.length > 1) {
                    const comboLabel = matchingRows.length === 2 ? 'DOUBLE CLEAR' : matchingRows.length === 3 ? 'TRIPLE CLEAR' : `CASCADE x${matchingRows.length}`;
                    setComboText(`${comboLabel} +${cascadeScore}`);
                    setTimeout(() => setComboText(''), 1200);
                }

                const particlesToSpawn = [];
                matchingRows.forEach(y => {
                    workingGrid[y].forEach((cell, x) => {
                        if (cell !== null) {
                            particlesToSpawn.push({
                                id: `p-${x}-${y}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
                                x, y, val: cell,
                                tx: `${randomInt(-200, 200)}px`,
                                ty: `${randomInt(-150, -400)}px`,
                                rot: `${randomInt(-180, 180)}deg`
                            });
                        }
                    });
                });

                setTimeout(() => {
                    setExplodingParticles(prev => [...prev, ...particlesToSpawn]);

                    const collapsedGrid = workingGrid.filter((_, idx) => !matchingRows.includes(idx));
                    for (let i = 0; i < matchingRows.length; i++) {
                        collapsedGrid.unshift(Array(COLS).fill(null));
                    }
                    setGrid(collapsedGrid);
                    setClearingRows([]);

                    setTimeout(() => {
                        setExplodingParticles([]);
                        resolvingRowsRef.current = false;
                        requestResolveVisibleMatches(collapsedGrid, stateRef.current.conveyor);
                    }, 600);
                }, 1000);
            };

            const lockTile = (x, y, val) => {
                const newGrid = stateRef.current.grid.map(row => [...row]);
                newGrid[y][x] = val;
                setGrid(newGrid);
                requestResolveVisibleMatches(newGrid, stateRef.current.conveyor);

                if (stateRef.current.mode === 'sliding') {
                    setActiveTile(null);
                } else {
                    setQueue(prev => [prev[1], generateTile()]);
                }
            };

            // Game Over Check for Direct Mode
            useEffect(() => {
                if (mode === 'direct' && !gameOver) {
                    const isFull = grid[0].every(cell => cell !== null);
                    if (isFull) setGameOver(true);
                }
            }, [grid, mode, gameOver]);

            // Spawn Trigger for Sliding Mode
            useEffect(() => {
                if (activeTile === null && !gameOver && mode === 'sliding') {
                    setTimeout(spawnTileForSliding, 50);
                }
            }, [activeTile, gameOver, mode]);

            const getLandingRowForColumn = (sourceGrid, colIndex) => {
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (sourceGrid[r][colIndex] === null) return r;
                }
                return -1;
            };

            const getLegalDirectDropColumns = (sourceGrid) => {
                const legal = [];
                for (let col = 0; col < COLS; col++) {
                    if (getLandingRowForColumn(sourceGrid, col) !== -1) legal.push(col);
                }
                return legal;
            };

            const getColumnHeights = (sourceGrid) => {
                const heights = [];
                for (let col = 0; col < COLS; col++) {
                    let firstFilled = ROWS;
                    for (let row = 0; row < ROWS; row++) {
                        if (sourceGrid[row][col] !== null) {
                            firstFilled = row;
                            break;
                        }
                    }
                    heights.push(firstFilled === ROWS ? 0 : ROWS - firstFilled);
                }
                return heights;
            };

            const simulateDirectDropResult = (sourceGrid, colIndex, valToDrop) => {
                const landingRow = getLandingRowForColumn(sourceGrid, colIndex);
                if (landingRow === -1) return null;

                const nextGrid = sourceGrid.map(row => [...row]);
                nextGrid[landingRow][colIndex] = valToDrop;
                return { nextGrid, landingRow, colIndex };
            };

            const scoreRowProximity = (sum, target, hasTiles) => {
                if (!hasTiles) return 0;
                const gap = target - sum;
                const absGap = Math.abs(gap);
                if (gap === 0) return DEMO_WEIGHTS.exactMatch;
                if (gap === 1) return DEMO_WEIGHTS.near1;
                if (gap === 2) return DEMO_WEIGHTS.near2;
                if (gap === 3) return DEMO_WEIGHTS.near3;

                let score = 0;
                if (gap < 0) {
                    const overshoot = Math.abs(gap);
                    score += (overshoot * DEMO_WEIGHTS.overshootUnit) + (overshoot * overshoot * DEMO_WEIGHTS.overshootQuad);
                } else if (absGap >= 7) {
                    score += DEMO_WEIGHTS.junkRowPenalty * Math.min(absGap - 6, 4);
                }
                return score;
            };

            const evaluateSimulatedMove = (sourceGrid, sourceConveyor, simulated) => {
                if (!simulated) return Number.NEGATIVE_INFINITY;
                const { nextGrid, landingRow, colIndex } = simulated;

                let score = 0;
                const landingTarget = sourceConveyor[landingRow];
                const beforeLandingSum = getRowSumFromGrid(sourceGrid, landingRow);
                const afterLandingSum = getRowSumFromGrid(nextGrid, landingRow);
                const beforeGap = Math.abs(landingTarget - beforeLandingSum);
                const afterGap = Math.abs(landingTarget - afterLandingSum);
                const landingHadTiles = sourceGrid[landingRow].some(cell => cell !== null);

                score += scoreRowProximity(afterLandingSum, landingTarget, true);
                score += (beforeGap - afterGap) * DEMO_WEIGHTS.improveGap;
                if (afterGap > beforeGap) score += DEMO_WEIGHTS.worsenGap;
                if (landingHadTiles && afterGap <= beforeGap) score += DEMO_WEIGHTS.investedRowBonus;

                for (let row = 0; row < ROWS; row++) {
                    if (row === landingRow) continue;
                    const rowHasTiles = nextGrid[row].some(cell => cell !== null);
                    const rowSum = getRowSumFromGrid(nextGrid, row);
                    score += scoreRowProximity(rowSum, sourceConveyor[row], rowHasTiles) * 0.24;
                    if (rowHasTiles) score += DEMO_WEIGHTS.activeRowBonus;
                }

                const heights = getColumnHeights(nextGrid);
                const maxHeight = Math.max(...heights);
                const minHeight = Math.min(...heights);
                heights.forEach(h => {
                    score += (h * DEMO_WEIGHTS.heightBase) + (h * h * DEMO_WEIGHTS.heightSquared);
                    if (h >= ROWS - 1) score += DEMO_WEIGHTS.landedTopDanger;
                });

                score += maxHeight * DEMO_WEIGHTS.maxHeightDanger;
                score += (maxHeight - minHeight) * DEMO_WEIGHTS.skylineSpreadBonus;

                const topDanger = landingRow <= 2 ? (3 - landingRow) : 0;
                if (topDanger > 0) score += topDanger * DEMO_WEIGHTS.landedTopDanger;

                // Small center bias keeps the bot from tunneling one side.
                score -= Math.abs(colIndex - ((COLS - 1) / 2)) * 8;

                return score;
            };

            const chooseDemoColumn = (sourceGrid, sourceConveyor, currentTile, nextTile) => {
                const legalCols = getLegalDirectDropColumns(sourceGrid);
                if (!legalCols.length) return { col: -1, score: Number.NEGATIVE_INFINITY };

                let bestCol = legalCols[0];
                let bestScore = Number.NEGATIVE_INFINITY;
                legalCols.forEach(col => {
                    const currentSim = simulateDirectDropResult(sourceGrid, col, currentTile);
                    const currentScore = evaluateSimulatedMove(sourceGrid, sourceConveyor, currentSim);

                    let combinedScore = currentScore;
                    if (nextTile !== undefined && nextTile !== null && currentSim) {
                        const nextLegalCols = getLegalDirectDropColumns(currentSim.nextGrid);
                        let nextBest = Number.NEGATIVE_INFINITY;
                        nextLegalCols.forEach(nextCol => {
                            const nextSim = simulateDirectDropResult(currentSim.nextGrid, nextCol, nextTile);
                            const nextScore = evaluateSimulatedMove(currentSim.nextGrid, sourceConveyor, nextSim);
                            if (nextScore > nextBest) nextBest = nextScore;
                        });
                        if (nextBest !== Number.NEGATIVE_INFINITY) combinedScore += nextBest * DEMO_LOOKAHEAD_FACTOR;
                    }

                    if (combinedScore > bestScore) {
                        bestScore = combinedScore;
                        bestCol = col;
                    }
                });
                return { col: bestCol, score: bestScore };
            };

            const startDirectDrop = (colIndex) => {
                const { mode, gameOver, guideOpen, animatingDrop, grid, queue } = stateRef.current;
                if (mode !== 'direct' || gameOver || guideOpen || animatingDrop) return false;

                const targetY = getLandingRowForColumn(grid, colIndex);
                if (targetY === -1) return false;

                const valToDrop = queue[0];
                setAnimatingDrop({ x: colIndex, startY: -1, endY: targetY, val: valToDrop, isDropping: false });

                requestAnimationFrame(() => {
                    setAnimatingDrop(prev => prev ? { ...prev, isDropping: true } : prev);
                });

                clearTimeout(directDropCommitRef.current);
                directDropCommitRef.current = setTimeout(() => {
                    lockTile(colIndex, targetY, valToDrop);
                    setAnimatingDrop(null);
                }, DIRECT_DROP_ANIM_MS);

                return true;
            };

            // Interaction: Direct Drop
            const handleColumnClick = (colIndex) => {
                if (stateRef.current.demoMode) return;
                startDirectDrop(colIndex);
            };

            // Interaction: Sliding
            const moveActiveTile = (dx, dy) => {
                const { grid, activeTile } = stateRef.current;
                if (!activeTile || grid === undefined) return false;

                const newX = activeTile.x + dx;
                const newY = activeTile.y + dy;

                if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
                if (newY >= 0 && grid[newY][newX] !== null) return false;

                setActiveTile({ ...activeTile, x: newX, y: newY });
                return true;
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (stateRef.current.mode !== 'sliding' || stateRef.current.gameOver || stateRef.current.guideOpen) return;

                    switch(e.key) {
                        case 'ArrowLeft': moveActiveTile(-1, 0); break;
                        case 'ArrowRight': moveActiveTile(1, 0); break;
                        case 'ArrowDown':
                            if (!moveActiveTile(0, 1)) {
                                const { activeTile } = stateRef.current;
                                if(activeTile) lockTile(activeTile.x, activeTile.y, activeTile.val);
                            }
                            break;
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                if (mode !== 'sliding' || gameOver || guideOpen) return;

                const interval = setInterval(() => {
                    const { activeTile } = stateRef.current;
                    if (activeTile) {
                        if (!moveActiveTile(0, 1)) {
                            lockTile(activeTile.x, activeTile.y, activeTile.val);
                        }
                    }
                }, FALL_SPEED_MS);

                return () => clearInterval(interval);
            }, [mode, gameOver, guideOpen]);

            useEffect(() => {
                if (!demoMode || gameOver || guideOpen || mode !== 'direct' || animatingDrop || conveyorAnim || clearingRows.length > 0 || explodingParticles.length > 0) return;

                demoTimerRef.current = setTimeout(() => {
                    const { grid, conveyor, queue } = stateRef.current;
                    const choice = chooseDemoColumn(grid, conveyor, queue[0], queue[1]);
                    if (choice.col !== -1) startDirectDrop(choice.col);
                }, DEMO_THINK_MS + randomInt(0, DEMO_PAUSE_JITTER_MS));

                return () => clearTimeout(demoTimerRef.current);
            }, [demoMode, gameOver, guideOpen, mode, animatingDrop, grid, conveyor, queue, conveyorAnim, clearingRows, explodingParticles]);

            useEffect(() => {
                if (gameOver) setDemoMode(false);
            }, [gameOver]);

            const getRowDelta = (rowIndex, targetValue = conveyor[rowIndex]) => {
                const sum = getRowSumFromGrid(grid, rowIndex);
                const hasTiles = grid[rowIndex].some(cell => cell !== null);
                return { sum, hasTiles, difference: Math.abs(targetValue - sum) };
            };

            const getTickDuration = (advances) => {
                const t = Math.min(advances / TICK_RAMP_ADVANCES, 1);
                return Math.round(MAX_TICK_MS - (MAX_TICK_MS - MIN_TICK_MS) * t);
            };

            const getCascadeScore = (clearedRows) => {
                const base = clearedRows * 100;
                const bonus = clearedRows > 1 ? (clearedRows - 1) * clearedRows * 50 : 0;
                return base + bonus;
            };

            // Conveyor movement: once the shift is visible, resolve matches against the now-visible targets.
            const evaluateRowsAndAdvance = () => {
                const { grid, conveyor, incomingTarget, advanceCount } = stateRef.current;

                setConveyorAnim(true);

                setTimeout(() => {
                    const newConveyor = [incomingTarget, ...conveyor.slice(0, -1)];
                    const nextAdvanceCount = advanceCount + 1;

                    setConveyorAnim(false);
                    setConveyor(newConveyor);
                    setIncomingTarget(generateTarget());
                    setAdvanceCount(nextAdvanceCount);
                    requestResolveVisibleMatches(grid, newConveyor);
                }, 400); // Conveyor physical slide duration
            };

            const currentTickMs = getTickDuration(advanceCount);

            useEffect(() => {
                if (gameOver || guideOpen) return;

                let elapsedTime = (progress / 100) * currentTickMs;

                const tick = () => {
                    elapsedTime += PROGRESS_INTERVAL_MS;
                    const percentage = Math.min((elapsedTime / currentTickMs) * 100, 100);

                    if (elapsedTime >= currentTickMs) {
                        evaluateRowsAndAdvance();
                        elapsedTime = 0;
                        setProgress(0);
                    } else {
                        setProgress(percentage);
                    }
                };

                tickTimerRef.current = setInterval(tick, PROGRESS_INTERVAL_MS);
                return () => clearInterval(tickTimerRef.current);
            }, [gameOver, guideOpen, currentTickMs]);

            const resetGameState = ({ nextDemoMode = false, nextMode = stateRef.current.mode } = {}) => {
                clearTimeout(directDropCommitRef.current);
                clearTimeout(demoTimerRef.current);
                resolvePendingRef.current = false;
                resolvingRowsRef.current = false;
                setGrid(createEmptyGrid());
                setConveyor(Array.from({ length: ROWS }, generateTarget));
                setIncomingTarget(generateTarget());
                setActiveTile(null);
                setQueue([generateTile(), generateTile()]);
                setGameOver(false);
                setConveyorAnim(false);
                setScore(0);
                setProgress(0);
                setClearingRows([]);
                setExplodingParticles([]);
                setComboText('');
                setAdvanceCount(0);
                setAnimatingDrop(null);
                setMode(nextMode);
                setDemoMode(nextDemoMode);
            };

            const restart = () => {
                resetGameState({
                    nextDemoMode: stateRef.current.demoMode,
                    nextMode: stateRef.current.demoMode ? 'direct' : stateRef.current.mode
                });
            };

            const toggleMode = () => {
                if (demoMode) return;
                setMode(prev => prev === 'direct' ? 'sliding' : 'direct');
                setActiveTile(null);
            };

            const toggleDemoMode = () => {
                const isTurningOn = !stateRef.current.demoMode;
                if (isTurningOn) {
                    resetGameState({ nextDemoMode: true, nextMode: 'direct' });
                    return;
                }
                resetGameState({ nextDemoMode: false, nextMode: 'direct' });
            };

            const openGuide = () => setGuideOpen(true);

            const getRowSum = (rowIndex) => getRowSumFromGrid(grid, rowIndex);

            const updateUiScale = useCallback(() => {
                const frame = frameRef.current;
                if (!frame) return;

                const availableWidth = window.innerWidth - 16;
                const availableHeight = window.innerHeight - 16;
                const widthScale = availableWidth / frame.offsetWidth;
                const heightScale = availableHeight / frame.offsetHeight;
                const nextScale = Math.min(1, widthScale, heightScale);

                setUiScale(Number.isFinite(nextScale) ? Math.max(nextScale, 0.6) : 1);
            }, []);

            useEffect(() => {
                updateUiScale();
                window.addEventListener('resize', updateUiScale);
                window.addEventListener('orientationchange', updateUiScale);
                return () => {
                    clearTimeout(directDropCommitRef.current);
                    clearTimeout(demoTimerRef.current);
                    window.removeEventListener('resize', updateUiScale);
                    window.removeEventListener('orientationchange', updateUiScale);
                };
            }, [updateUiScale]);

            return (
                <div className="w-screen h-[100svh] flex flex-col items-center justify-center p-2 sm:p-4 overflow-hidden">
                    <div
                        style={{
                            transform: `scale(${uiScale})`,
                            transformOrigin: 'center center',
                            transition: 'transform 180ms ease-out'
                        }}
                    >
                    <div ref={frameRef} className="z-10 w-fit flex flex-col items-stretch max-w-full">

                        {/* Header Area */}
                        <div className="w-full flex justify-center items-stretch mb-6 gap-4">
                            {/* Top Pane: Next Tiles */}
                            <div className="liquid-panel px-6 py-3 flex items-center justify-center gap-6 min-w-[220px]">
                                <div className="flex flex-col items-center">
                                    <div className="text-[10px] uppercase tracking-widest opacity-60 mb-2 font-bold text-white">Next Tiles</div>
                                    <div className="flex gap-3 items-center">
                                        <div className="liquid-tile w-12 h-12 text-2xl shadow-[0_0_15px_rgba(255,255,255,0.2)]">
                                            {queue[0]}
                                        </div>
                                        <div className="liquid-tile w-9 h-9 text-lg opacity-50">
                                            {queue[1]}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Main Game Area */}
                        <div className="w-full flex gap-3 sm:gap-4 justify-center items-start">
                            {/* Left: Score */}
                            <div className="liquid-panel px-8 py-3 flex flex-col items-center justify-center min-w-[120px] self-center">
                                <div className="text-[10px] uppercase tracking-widest opacity-60 mb-1 font-bold text-white">Score</div>
                                <div className="text-2xl font-bold tracking-tight text-white">{score}</div>
                                <div className={`mt-1 text-[10px] uppercase tracking-[0.14em] text-emerald-200/90 transition-opacity duration-300 ${comboText ? 'opacity-100' : 'opacity-0'}`}>
                                    {comboText || ' '}
                                </div>
                            </div>

                            {/* Center: Game Board */}
                            <div className="liquid-panel p-3 shadow-2xl">
                                <div
                                    className="relative bg-black/20 rounded-xl"
                                    style={{
                                        width: (COLS * CELL_SIZE) + (PAD * 2) + 'px',
                                        height: (ROWS * CELL_SIZE) + (PAD * 2) + 'px',
                                        padding: `${PAD}px`,
                                        display: 'grid',
                                        gridTemplateColumns: `repeat(${COLS}, ${CELL_SIZE}px)`,
                                        gridTemplateRows: `repeat(${ROWS}, ${CELL_SIZE}px)`
                                    }}
                                >
                                    {/* Grid guides */}
                                    {Array.from({ length: ROWS * COLS }).map((_, i) => (
                                        <div key={i} className="border-[0.5px] border-white/5 w-14 h-14 box-border"></div>
                                    ))}

                                    {/* Column Interactors */}
                                    {mode === 'direct' && Array.from({ length: COLS }).map((_, col) => (
                                        <div
                                            key={`col-${col}`}
                                            className={`absolute w-14 col-hover-area transition-colors z-10 ${demoMode || animatingDrop ? 'cursor-not-allowed opacity-60' : 'cursor-pointer'}`}
                                            style={{ top: `${PAD}px`, bottom: `${PAD}px`, left: (col * CELL_SIZE) + PAD + 'px' }}
                                            onClick={() => handleColumnClick(col)}
                                        />
                                    ))}

                                    {/* Static/Vibrating Grid Tiles */}
                                    {grid.map((row, y) =>
                                        row.map((cell, x) => {
                                            if (cell === null) return null;
                                            const isClearing = clearingRows.includes(y);
                                            return (
                                                <div
                                                    key={`cell-${x}-${y}`}
                                                    className={`absolute w-12 h-12 m-1 liquid-tile text-xl ${isClearing ? 'vibrating-row' : ''}`}
                                                    style={{ left: (x * CELL_SIZE) + PAD + 'px', top: (y * CELL_SIZE) + PAD + 'px' }}
                                                >
                                                    {cell}
                                                </div>
                                            );
                                        })
                                    )}

                                    {/* Player Active Tile (Sliding Mode) */}
                                    {mode === 'sliding' && activeTile && (
                                        <div
                                            className="absolute w-12 h-12 m-1 liquid-tile text-xl border-white/40 shadow-[0_0_20px_rgba(255,255,255,0.3)] z-20"
                                            style={{ left: (activeTile.x * CELL_SIZE) + PAD + 'px', top: (activeTile.y * CELL_SIZE) + PAD + 'px' }}
                                        >
                                            {activeTile.val}
                                        </div>
                                    )}

                                    {/* Direct Drop Animated Tile */}
                                    {mode === 'direct' && animatingDrop && (
                                        <div
                                            className="absolute w-12 h-12 m-1 liquid-tile text-xl border-white/35 shadow-[0_0_18px_rgba(255,255,255,0.24)] z-20"
                                            style={{
                                                left: (animatingDrop.x * CELL_SIZE) + PAD + 'px',
                                                top: ((animatingDrop.isDropping ? animatingDrop.endY : animatingDrop.startY) * CELL_SIZE) + PAD + 'px',
                                                transition: `top ${DIRECT_DROP_ANIM_MS}ms cubic-bezier(0.2, 0.75, 0.3, 1)`
                                            }}
                                        >
                                            {animatingDrop.val}
                                        </div>
                                    )}

                                    {/* Exploding Particles Layer */}
                                    {explodingParticles.map(p => (
                                        <div
                                            key={p.id}
                                            className="absolute w-12 h-12 m-1 liquid-tile text-xl particle"
                                            style={{
                                                left: (p.x * CELL_SIZE) + PAD + 'px',
                                                top: (p.y * CELL_SIZE) + PAD + 'px',
                                                '--tx': p.tx,
                                                '--ty': p.ty,
                                                '--rot': p.rot
                                            }}
                                        >
                                            {p.val}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Mid: Row Sum Indicators */}
                            <div className="grid w-[28px] sm:w-[32px] shrink-0"
                                style={{
                                    height: (ROWS * CELL_SIZE) + (PAD * 2) + 'px',
                                    gridTemplateRows: `repeat(${ROWS}, ${CELL_SIZE}px)`,
                                    paddingTop: `${PAD}px`,
                                    paddingBottom: `${PAD}px`
                                }}
                            >
                                {conveyor.map((target, idx) => {
                                    const { sum, hasTiles, difference } = getRowDelta(idx, target);
                                    const stateClass = !hasTiles
                                        ? 'text-white/15'
                                        : difference === 0
                                            ? 'text-emerald-200/95 drop-shadow-[0_0_10px_rgba(100,255,160,0.4)] font-semibold'
                                            : difference <= 1
                                                ? 'text-white/80'
                                                : difference <= 2
                                                    ? 'text-white/60'
                                                    : 'text-white/35';
                                    return (
                                        <div key={`sum-${idx}`} className="h-full flex items-center justify-center">
                                            <span className={`text-sm sm:text-base tracking-tight tabular-nums transition-all duration-300 ${stateClass}`}>
                                                {hasTiles ? sum : ''}
                                            </span>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Right: Timer + Conveyor Targets */}
                            <div className="flex flex-col gap-3 sm:gap-4">
                                <div className="liquid-panel px-4 py-3 flex flex-col items-center justify-center w-[88px]">
                                    <div className="text-[10px] uppercase tracking-widest opacity-60 mb-2 font-bold text-white">Timer</div>
                                    <div className="relative w-12 h-12 flex items-center justify-center">
                                        <svg width="48" height="48" className="rotate-90">
                                            <circle cx="24" cy="24" r="20" fill="transparent" stroke="rgba(255,255,255,0.05)" strokeWidth="4" />
                                            <circle
                                                cx="24" cy="24" r="20"
                                                fill="transparent"
                                                stroke="rgba(255,255,255,0.8)"
                                                strokeWidth="4"
                                                strokeDasharray="125.66"
                                                strokeDashoffset={125.66 - (progress / 100) * 125.66}
                                                className="progress-ring__circle drop-shadow-md"
                                            />
                                        </svg>
                                        <div className="absolute font-bold text-xs text-white">
                                            {Math.ceil((currentTickMs - (progress / 100 * currentTickMs)) / 1000)}s
                                        </div>
                                    </div>
                                </div>

                                <div className="liquid-panel p-3">
                                    <div
                                        className="relative flex flex-col bg-black/20 rounded-xl overflow-hidden w-16"
                                        style={{
                                            height: (ROWS * CELL_SIZE) + (PAD * 2) + 'px',
                                            paddingTop: `${PAD}px`,
                                            paddingBottom: `${PAD}px`
                                        }}
                                    >
                                    <div
                                        className="relative w-full h-full"
                                        style={{
                                            transform: conveyorAnim ? `translateY(${CELL_SIZE}px)` : 'translateY(0)',
                                            transition: conveyorAnim ? 'transform 400ms cubic-bezier(0.4, 0, 0.2, 1)' : 'none'
                                        }}
                                    >
                                        <div
                                            className="absolute w-full flex items-center justify-center z-10"
                                            style={{ height: `${CELL_SIZE}px`, top: `-${CELL_SIZE}px` }}
                                        >
                                            <div className="w-12 h-12 rounded-xl flex items-center justify-center target-tile">
                                                <span>{incomingTarget}</span>
                                            </div>
                                        </div>

                                        {conveyor.map((target, idx) => {
                                            const sum = getRowSum(idx);
                                            const hasTiles = grid[idx].some(c => c !== null);
                                            // Keeps the matched style locked while conveyorAnim is false.
                                            // When vibrating happens, conveyorAnim is false, so it stays lit.
                                            const isMatch = !conveyorAnim && hasTiles && sum === target;

                                            return (
                                                <div
                                                    key={`target-${idx}`}
                                                    className="absolute w-full flex items-center justify-center z-10"
                                                    style={{ height: `${CELL_SIZE}px`, top: `${idx * CELL_SIZE}px` }}
                                                >
                                                    <div className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-300 ${isMatch ? 'target-matched' : 'target-tile'}`}>
                                                        <span>{target}</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    <div className="absolute inset-0 pointer-events-none border-l-2 border-r-2 border-white/5 rounded-xl z-20"></div>
                                    <div className="absolute inset-0 pointer-events-none bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSJ0cmFuc3BhcmVudCIvPgo8Y2lyY2xlIGN4PSIxIiBjeT0iMSIgcj0iMSIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjAyKSIvPgo8L3N2Zz4=')] opacity-50 z-20"></div>
                                </div>
                            </div>
                            </div>
                        </div>

                        {/* Bottom Area: Mode Control */}
                        <div className="w-full flex justify-center mt-6">
                            <div className="liquid-panel px-4 sm:px-6 py-3 flex items-center gap-3 sm:gap-4">
                                <span className="text-[11px] font-bold uppercase tracking-widest opacity-60 text-white">Controls</span>
                                <button
                                    onClick={toggleMode}
                                    disabled={demoMode}
                                    className={`border rounded-full px-4 sm:px-5 py-1.5 text-sm font-medium transition-colors text-white whitespace-nowrap ${demoMode ? 'bg-white/5 border-white/10 opacity-50 cursor-not-allowed' : 'bg-white/10 hover:bg-white/20 border-white/20'}`}
                                >
                                    {mode === 'direct' ? 'Direct Drop' : 'Sliding Placement'}
                                </button>
                                <button
                                    onClick={toggleDemoMode}
                                    className={`border rounded-full px-4 sm:px-5 py-1.5 text-sm font-medium transition-colors text-white whitespace-nowrap ${demoMode ? 'bg-emerald-300/20 border-emerald-200/45 shadow-[0_0_18px_rgba(80,255,160,0.22)]' : 'bg-white/5 hover:bg-white/15 border-white/15'}`}
                                >
                                    {demoMode ? 'Stop Demo' : 'Demo'}
                                </button>
                                <button
                                    onClick={openGuide}
                                    className="bg-white/5 hover:bg-white/15 border border-white/15 rounded-full px-4 sm:px-5 py-1.5 text-sm font-medium transition-colors text-white whitespace-nowrap"
                                >
                                    Guide
                                </button>
                            </div>
                        </div>

                    </div>
                    </div>

                    {/* Guide Modal */}
                    {guideOpen && (
                        <div className="absolute inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-md p-3 sm:p-6">
                            <div className="liquid-panel w-full max-w-2xl max-h-[calc(100svh-1.5rem)] sm:max-h-[calc(100svh-3rem)] flex flex-col overflow-hidden">
                                <button
                                    onClick={() => setGuideOpen(false)}
                                    className="absolute top-4 right-4 z-20 w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 text-white/80 hover:text-white text-lg leading-none flex items-center justify-center transition-colors"
                                    aria-label="Close guide"
                                >
                                    ×
                                </button>

                                <div className="px-5 sm:px-8 pt-6 sm:pt-8 pb-4 border-b border-white/10">
                                    <h2 className="text-3xl sm:text-4xl font-bold tracking-tight text-white">How to Play</h2>
                                    <p className="mt-2 text-sm sm:text-base text-white/80 pr-8">Build row sums that match the moving conveyor targets before the board fills up.</p>
                                </div>

                                <div className="flex-1 overflow-y-auto px-5 sm:px-8 py-5 sm:py-6 space-y-6">
                                    <section>
                                        <h3 className="text-xs uppercase tracking-widest font-bold text-white/60 mb-3">Rules</h3>
                                        <ul className="space-y-2 text-sm sm:text-base text-white/90 leading-relaxed">
                                            <li>• Drop number tiles into the grid.</li>
                                            <li>• Each row has a target value shown on the conveyor to the right.</li>
                                            <li>• The conveyor starts slower and ramps toward a 10-second advance pace as the run progresses.</li>
                                            <li>• If a row’s total exactly matches its current target, that row clears.</li>
                                            <li>• Cleared rows explode and disappear, and everything above falls down.</li>
                                            <li>• The game ends when the grid fills to the top.</li>
                                        </ul>
                                    </section>

                                    <section>
                                        <h3 className="text-xs uppercase tracking-widest font-bold text-white/60 mb-3">Gameplay</h3>
                                        <ul className="space-y-2 text-sm sm:text-base text-white/90 leading-relaxed">
                                            <li>• In Direct Drop mode, click a column to drop the current tile into it.</li>
                                            <li>• In Sliding Placement mode, move the falling tile with the arrow keys.</li>
                                            <li>• Plan ahead using the next-tile preview.</li>
                                            <li>• Set up rows that are close to matching, then use later tiles or falling cascades to finish them.</li>
                                            <li>• Chain reactions can clear multiple rows and score big points.</li>
                                        </ul>
                                    </section>

                                    <section>
                                        <h3 className="text-xs uppercase tracking-widest font-bold text-white/60 mb-3">UI Elements</h3>
                                        <ul className="space-y-2 text-sm sm:text-base text-white/90 leading-relaxed">
                                            <li>• Next Tiles: shows the current tile and the one after it.</li>
                                            <li>• Conveyor Timer: shows when the targets will advance.</li>
                                            <li>• Score: tracks your points.</li>
                                            <li>• Conveyor Targets: the row goals you are trying to match.</li>
                                            <li>• Row Sums: the thin middle column showing each row’s live total.</li>
                                            <li>• Controls: lets you switch between Direct Drop and Sliding Placement.</li>
                                            <li>• Guide: reopens this help screen.</li>
                                        </ul>
                                    </section>
                                </div>

                                <div className="px-5 sm:px-8 py-4 sm:py-5 border-t border-white/10 bg-black/20">
                                    <button
                                        onClick={() => setGuideOpen(false)}
                                        className="w-full bg-white text-gray-900 px-8 py-3 rounded-full font-bold text-lg shadow-[0_4px_14px_0_rgba(255,255,255,0.2)] hover:shadow-[0_6px_20px_rgba(255,255,255,0.3)] hover:bg-opacity-90 transition-all"
                                    >
                                        Play
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Game Over Modal */}
                    {gameOver && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md">
                            <div className="liquid-panel p-10 flex flex-col items-center transform scale-100 transition-all">
                                <h2 className="text-4xl font-bold mb-2 tracking-tight text-white">Game Over</h2>
                                <p className="text-lg opacity-80 mb-8 text-white">Final Score: {score}</p>
                                <button
                                    onClick={restart}
                                    className="bg-white text-gray-900 px-8 py-3 rounded-full font-bold text-lg shadow-[0_4px_14px_0_rgba(255,255,255,0.2)] hover:shadow-[0_6px_20px_rgba(255,255,255,0.3)] hover:bg-opacity-90 transition-all"
                                >
                                    Restart Protocol
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
